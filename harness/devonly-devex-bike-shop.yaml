pipeline:
  name: devonly-devex-bike-shop
  identifier: devonlydevexbikeshop
  projectIdentifier: devexbikeshop
  orgIdentifier: default
  tags: {}
  variables:
    - name: commitSha
      type: String
      default: "unknown"
      value: <+input>
    - name: buildNumber
      type: String
      default: "0"
      value: <+input>
    - name: branch
      type: String
      default: "main"
      value: <+input>
    - name: prNumber
      type: String
      default: "none"
      value: <+input>
    - name: triggeredBy
      type: String
      default: "GitHub Actions"
      value: <+input>
    - name: repoUrl
      type: String
      default: "https://github.com/devx-bike-shop"
      value: <+input>
    - name: runId
      type: String
      default: "0"
      value: <+input>
  stages:
    # ════════════════════════════════════════════════════════════
    # DEV ONLY — Deploy and Certify (Auto-Approved)
    # ════════════════════════════════════════════════════════════
    - stage:
        name: DEV
        identifier: DEV
        type: Custom
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
        spec:
          execution:
            steps:
              # ── Gate: Approve Database Deploy ──
              - step:
                  name: Approve Database Deploy
                  identifier: Approve_Database_Deploy
                  type: HarnessApproval
                  timeout: 10s
                  spec:
                    approvalMessage: |-
                      🗄️ Ready to deploy Database to DEV
                      Build: #<+pipeline.variables.buildNumber>
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Timeout
                        action:
                          type: MarkAsSuccess

              # ── Deploy Database ──
              - step:
                  name: Deploy Database
                  identifier: Deploy_Database
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "╔══════════════════════════════════════╗"
                          echo "║  DEPLOY — DATABASE                   ║"
                          echo "╚══════════════════════════════════════╝"
                          echo ""
                          echo "🗄️  Deploying database to DEV"
                          echo "   Build: #<+pipeline.variables.buildNumber> | Commit: <+pipeline.variables.commitSha>"
                          echo ""
                          echo "📦 Fetching manifest from bikeshop-db repo..."
                          cd /tmp && rm -rf bikeshop-db
                          git clone --depth 1 https://github.com/pdutta25/bikeshop-db.git 2>&1 | tail -1
                          echo ""
                          echo "📋 Component Manifest:"
                          cat bikeshop-db/manifest.json
                          echo ""
                          echo ""
                          sleep 2
                          echo "   Running schema diff... ✔"
                          sleep 2
                          echo "   Applying migrations..."
                          echo "     ✔ 001_create_products_table"
                          echo "     ✔ 002_create_categories_table"
                          echo "     ✔ 003_create_orders_table"
                          echo "     ✔ 004_create_customers_table"
                          sleep 2
                          echo "   Verifying integrity... ✔"
                          echo "   Seeding reference data... ✔"
                          echo ""
                          echo "✅ Database deployed to DEV"

              # ── Gate: Approve Services and UI Deploy ──
              - step:
                  name: Approve Services and UI Deploy
                  identifier: Approve_Services_and_UI_Deploy
                  type: HarnessApproval
                  timeout: 10s
                  spec:
                    approvalMessage: |-
                      ⚙️ Ready to deploy Services and UI to DEV
                      Build: #<+pipeline.variables.buildNumber>
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Timeout
                        action:
                          type: MarkAsSuccess

              # ── Deploy Services & UI in Parallel ──
              - parallel:
                  - step:
                      name: Deploy Services
                      identifier: Deploy_Services
                      type: ShellScript
                      timeout: 5m
                      spec:
                        shell: Bash
                        onDelegate: true
                        source:
                          type: Inline
                          spec:
                            script: |-
                              #!/bin/bash
                              echo "╔══════════════════════════════════════╗"
                              echo "║  DEPLOY — SERVICES (API)  [parallel] ║"
                              echo "╚══════════════════════════════════════╝"
                              echo ""
                              echo "⚙️  Deploying API services to DEV"
                              echo "   Build: #<+pipeline.variables.buildNumber> | Commit: <+pipeline.variables.commitSha>"
                              echo ""
                              echo "📦 Fetching manifest from bikeshop-services repo..."
                              cd /tmp && rm -rf bikeshop-services
                              git clone --depth 1 https://github.com/pdutta25/bikeshop-services.git 2>&1 | tail -1
                              echo ""
                              echo "📋 Component Manifest:"
                              cat bikeshop-services/manifest.json
                              echo ""
                              echo ""
                              sleep 2
                              echo "   Deploying Next.js API routes..."
                              echo "     ✔ /api/products"
                              echo "     ✔ /api/categories"
                              echo "     ✔ /api/orders"
                              echo "     ✔ /api/cart"
                              echo "     ✔ /api/health"
                              sleep 2
                              echo "   Health check... HTTP 200 ✔"
                              echo ""
                              echo "✅ Services deployed to DEV"
                  - step:
                      name: Deploy UI
                      identifier: Deploy_UI
                      type: ShellScript
                      timeout: 5m
                      spec:
                        shell: Bash
                        onDelegate: true
                        source:
                          type: Inline
                          spec:
                            script: |-
                              #!/bin/bash
                              echo "╔══════════════════════════════════════╗"
                              echo "║  DEPLOY — UI (Storefront) [parallel] ║"
                              echo "╚══════════════════════════════════════╝"
                              echo ""
                              echo "🎨 Deploying storefront UI to DEV"
                              echo "   Build: #<+pipeline.variables.buildNumber> | Commit: <+pipeline.variables.commitSha>"
                              echo ""
                              echo "📦 Fetching manifest from bikeshop-ui repo..."
                              cd /tmp && rm -rf bikeshop-ui
                              git clone --depth 1 https://github.com/pdutta25/bikeshop-ui.git 2>&1 | tail -1
                              echo ""
                              echo "📋 Component Manifest:"
                              cat bikeshop-ui/manifest.json
                              echo ""
                              echo ""
                              sleep 2
                              echo "   Deploying static assets... ✔"
                              sleep 2
                              echo "   Deploying SSR pages..."
                              echo "     ✔ Homepage"
                              echo "     ✔ Product catalog"
                              echo "     ✔ Product detail"
                              echo "     ✔ Cart & Checkout"
                              echo "     ✔ Admin dashboard"
                              sleep 2
                              echo "   CDN cache invalidation... ✔"
                              echo "   Visual diff check... no regressions ✔"
                              echo ""
                              echo "✅ UI deployed to DEV"

              # ── DEV Smoke Tests ──
              - step:
                  name: DEV Smoke Tests
                  identifier: DEV_Smoke_Tests
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "🔍 DEV Smoke Tests"
                          echo ""
                          echo "   ✔ [DEV-01] Build artifact verified"
                          echo "   ✔ [DEV-02] Config validation passed"
                          echo "   ✔ [DEV-03] Service health simulated"
                          echo ""
                          echo "┌──────────────────────────────────────┐"
                          echo "│     DEV SMOKE TEST RESULTS           │"
                          echo "├──────────────────────────────────────┤"
                          echo "│ Total Tests:    3                    │"
                          echo "│ Passed:         3                    │"
                          echo "│ Failed:         0                    │"
                          echo "│ Status:         ✅ ALL PASSED        │"
                          echo "└──────────────────────────────────────┘"
                          echo ""
                          echo "✅ DEV smoke tests passed"

              # ── Certify DEV Build (Auto-Approve in 10s) ──
              - step:
                  name: Certify DEV Build
                  identifier: Certify_DEV_Build
                  type: HarnessApproval
                  timeout: 10s
                  spec:
                    approvalMessage: |-
                      ✅ AUTO-CERTIFY: DEV Build
                      DEV deployment and smoke tests passed.
                      Build: #<+pipeline.variables.buildNumber>
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Timeout
                        action:
                          type: MarkAsSuccess

              # ── DEV Summary ──
              - step:
                  name: DEV Summary
                  identifier: DEV_Summary
                  type: ShellScript
                  timeout: 1m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          # Fetch versions from each component manifest
                          DB_VER=$(cat /tmp/bikeshop-db/manifest.json 2>/dev/null | grep -o '"version": *"[^"]*"' | cut -d'"' -f4 || echo "unknown")
                          DB_CHANGE=$(cat /tmp/bikeshop-db/manifest.json 2>/dev/null | grep -o '"lastChange": *"[^"]*"' | cut -d'"' -f4 || echo "unknown")
                          SVC_VER=$(cat /tmp/bikeshop-services/manifest.json 2>/dev/null | grep -o '"version": *"[^"]*"' | cut -d'"' -f4 || echo "unknown")
                          SVC_CHANGE=$(cat /tmp/bikeshop-services/manifest.json 2>/dev/null | grep -o '"lastChange": *"[^"]*"' | cut -d'"' -f4 || echo "unknown")
                          UI_VER=$(cat /tmp/bikeshop-ui/manifest.json 2>/dev/null | grep -o '"version": *"[^"]*"' | cut -d'"' -f4 || echo "unknown")
                          UI_CHANGE=$(cat /tmp/bikeshop-ui/manifest.json 2>/dev/null | grep -o '"lastChange": *"[^"]*"' | cut -d'"' -f4 || echo "unknown")
                          echo ""
                          echo "┌──────────────────────────────────────────────┐"
                          echo "│          DEV STAGE SUMMARY                   │"
                          echo "├──────────────────────────────────────────────┤"
                          echo "│ Build:   #<+pipeline.variables.buildNumber>"
                          echo "│ Commit:  <+pipeline.variables.commitSha>"
                          echo "│ Branch:  <+pipeline.variables.branch>"
                          echo "│ Trigger: <+pipeline.variables.triggeredBy>"
                          echo "├──────────────────────────────────────────────┤"
                          echo "│ ✅ Database  v${DB_VER}  — ${DB_CHANGE}"
                          echo "│ ✅ Services  v${SVC_VER}  — ${SVC_CHANGE}"
                          echo "│ ✅ UI        v${UI_VER}  — ${UI_CHANGE}"
                          echo "│ ✅ Smoke Tests Passed (3/3)"
                          echo "│ ✅ Build Certified"
                          echo "├──────────────────────────────────────────────┤"
                          echo "│ Result:  ✅ DEV PASSED"
                          echo "└──────────────────────────────────────────────┘"
                          echo ""
                          echo "🔗 Trace: <+pipeline.variables.repoUrl>/commit/<+pipeline.variables.commitSha>"
                          echo ""
        tags: {}
