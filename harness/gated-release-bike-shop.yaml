                          echo "  🚀 PROD COMPLETE — proceeding to Pipeline Debrief"
                          echo ""
        tags: {}

    # ════════════════════════════════════════════════════════════
    # End — Pipeline Debrief
    # ════════════════════════════════════════════════════════════
    - stage:
        name: End
        identifier: End
        type: Custom
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
        spec:
          execution:
            steps:
              # ── Pipeline Debrief ──
              - step:
                  name: Pipeline Debrief
