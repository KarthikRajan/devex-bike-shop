                          echo "│ Failed:         0                    │"
                          echo "│ Status:         ✅ ALL PASSED        │"
                          echo "└──────────────────────────────────────┘"
                          echo ""
                          echo "✅ SIT integration tests passed"

              # ── Certify SIT Build (Auto-Approve in 10s) ──
              - step:
                  name: Certify SIT Build
                  identifier: Certify_SIT_Build
                  type: HarnessApproval
                  timeout: 10s
                  spec:
                    approvalMessage: |-
                      ✅ Certifying all 3 components deployed successfully to SIT
                      Database v<+pipeline.variables.dbVer> | Services v<+pipeline.variables.svcVer> | UI v<+pipeline.variables.uiVer>
                      Build: #<+pipeline.variables.buildNumber>
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Timeout
                        action:
                          type: MarkAsSuccess

              # ── SIT Recap ──
              - step:
                  name: SIT Recap
                  identifier: SIT_Recap
                  type: ShellScript
                  timeout: 1m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo ""
                          echo "╔══════════════════════════════════════════════════════════════════╗"
                          echo "║                        SIT RECAP                                ║"
                          echo "║  Summary of what was deployed and verified in SIT.                ║"
                          echo "╚══════════════════════════════════════════════════════════════════╝"
