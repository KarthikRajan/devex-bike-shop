                          echo "  └───────────────────────────────────────────────────────────────"
                          echo ""
                          echo "  ┌─ SIT ─────────────────────────────────────────────────────────"
                          echo "  │ Approval:       ✔ Auto-approved (per component)"
                          echo "  │ Database:       ✔ Deployed"
                          echo "  │ Services:       ✔ Deployed (parallel)"
                          echo "  │ UI:             ✔ Deployed (parallel)"
                          echo "  │ Integration:    ✔ Passed (4/4)"
                          echo "  │ Certified:      ✔ Auto-certified"
                          echo "  │ Result:         ✅ SIT PASSED"
                          echo "  └───────────────────────────────────────────────────────────────"
                          echo ""
                          echo "  ┌─ PROD ────────────────────────────────────────────────────────"
                          echo "  │ Approval:       ✔ Manually approved"
                          echo "  │ Database:       ✔ Deployed"
