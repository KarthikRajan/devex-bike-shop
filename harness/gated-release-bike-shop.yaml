                          echo "  │ CI:             ✔ Build  ✔ Lint  ✔ Test"
                          echo "  └───────────────────────────────────────────────────────────────"
                          echo ""
                          echo "── 3. Stage Results ──────────────────────────────────────────────"
                          echo ""
                          echo "  ┌─ DEV ─────────────────────────────────────────────────────────"
                          echo "  │ Approval:       ✔ Auto-approved (per component)"
