pipeline:
  name: gated-release-bike-shop
  identifier: gatedreleasebikeshop
  projectIdentifier: devexbikeshop
  orgIdentifier: default
  tags: {}
  variables:
    - name: commitSha
      type: String
      default: "unknown"
      value: <+input>
    - name: buildNumber
      type: String
      default: "0"
      value: <+input>
    - name: branch
      type: String
      default: "main"
      value: <+input>
    - name: prNumber
      type: String
      default: "none"
      value: <+input>
    - name: triggeredBy
      type: String
      default: "GitHub Actions"
      value: <+input>
    - name: repoUrl
      type: String
      default: "https://github.com/devx-bike-shop"
      value: <+input>
    - name: runId
      type: String
      default: "0"
      value: <+input>
    - name: dbVer
      type: String
      default: "unknown"
      value: <+input>
    - name: dbChange
      type: String
      default: "unknown"
      value: <+input>
    - name: svcVer
      type: String
      default: "unknown"
      value: <+input>
    - name: svcChange
      type: String
      default: "unknown"
      value: <+input>
    - name: uiVer
      type: String
      default: "unknown"
      value: <+input>
    - name: uiChange
      type: String
      default: "unknown"
      value: <+input>
    - name: triggerRepo
      type: String
      default: "unknown"
      value: <+input>
  stages:
    # ════════════════════════════════════════════════════════════
    # Start — Pipeline Overview
    # ════════════════════════════════════════════════════════════
    - stage:
        name: Start
        identifier: Start
        type: Custom
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
        spec:
          execution:
            steps:
              # ── Whats Releasing ──
              - step:
                  name: Whats Releasing
                  identifier: Whats_Shipping
                  type: ShellScript
                  timeout: 1m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo ""
                          echo "╔══════════════════════════════════════════════════════════════════╗"
                          echo "║                      WHATS RELEASING                                ║"
                          echo "║  Pipeline identity, release pattern, and trigger details.         ║"
                          echo "╚══════════════════════════════════════════════════════════════════╝"
                          echo ""
                          echo "── Pipeline ──────────────────────────────────────────────────────"
                          echo "  Name:           gated-release-bike-shop"
                          echo "  Pattern:        Gated Release"
                          echo "  Strategy:       Approve each component independently —"
                          echo "                  deploy what's ready, hold what's not."
                          echo "  Target:         DEV"
                          echo "  Build:          #<+pipeline.variables.buildNumber>"
                          echo "  Commit:         <+pipeline.variables.commitSha>"
                          echo "  Branch:         <+pipeline.variables.branch>"
                          echo "  Triggered by:   <+pipeline.variables.triggeredBy>"
                          echo "  Trigger repo:   https://github.com/<+pipeline.variables.triggerRepo>"
                          echo ""
              # ── Whats Inside ──
              - step:
                  name: Whats Inside
                  identifier: Whats_Inside
                  type: ShellScript
                  timeout: 1m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo ""
                          echo "╔══════════════════════════════════════════════════════════════════╗"
                          echo "║                      WHATS INSIDE                             ║"
                          echo "║  All components included in this release with versions.           ║"
                          echo "╚══════════════════════════════════════════════════════════════════╝"
                          echo ""
                          echo "── Components in this Release ────────────────────────────────────"
                          echo "  🗄️  Database     → bikeshop-db         v<+pipeline.variables.dbVer>"
                          echo "                     <+pipeline.variables.dbChange>"
                          echo "  ⚙️  Services     → bikeshop-services   v<+pipeline.variables.svcVer>"
                          echo "                     <+pipeline.variables.svcChange>"
                          echo "  🎨  UI           → bikeshop-ui         v<+pipeline.variables.uiVer>"
                          echo "                     <+pipeline.variables.uiChange>"
                          echo ""
              # ── How Its Releasing ──
              - step:
                  name: How Its Releasing
                  identifier: How_It_Ships
                  type: ShellScript
                  timeout: 1m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo ""
                          echo "╔══════════════════════════════════════════════════════════════════╗"
                          echo "║                      HOW ITS RELEASING                              ║"
                          echo "║  Release flow diagram and source repositories.                    ║"
                          echo "╚══════════════════════════════════════════════════════════════════╝"
                          echo ""
                          echo "── Release Flow ──────────────────────────────────────────────────"
                          echo "  Approve DB  →  Deploy DB"
                          echo "       ↓"
                          echo "  Approve Svc →  Deploy Svc  ┐ parallel"
                          echo "  Approve UI  →  Deploy UI   ┘"
                          echo "       ↓"
                          echo "  Smoke Tests →  Certify  →  Pipeline Debrief"
                          echo ""
                          echo "── Source Repos ──────────────────────────────────────────────────"
                          echo "  https://github.com/pdutta25/bikeshop-db"
                          echo "  https://github.com/pdutta25/bikeshop-services"
                          echo "  https://github.com/pdutta25/bikeshop-ui"
                          echo ""
                          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                          echo "  Proceeding to component approvals and deployments..."
                          echo ""
        tags: {}

    # ════════════════════════════════════════════════════════════
    # DEV — Deploy and Certify (Auto-Approved)
    # ════════════════════════════════════════════════════════════
    - stage:
        name: DEV
        identifier: DEV
        type: Custom
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
        spec:
          execution:
            steps:
              # ── Gate: Approve Database Deploy ──
              - step:
                  name: Approve Database Deploy
                  identifier: Approve_Database_Deploy
                  type: HarnessApproval
                  timeout: 10s
                  spec:
                    approvalMessage: |-
                      🗄️ Approving Database component for deployment to DEV
                      Database v<+pipeline.variables.dbVer> — <+pipeline.variables.dbChange>
                      CI: ✔ Build ✔ Lint ✔ Test — https://github.com/pdutta25/bikeshop-db/actions
                      Build: #<+pipeline.variables.buildNumber>
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Timeout
                        action:
                          type: MarkAsSuccess

              # ── Deploy Database ──
              - step:
                  name: Deploy Database
                  identifier: Deploy_Database
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "╔══════════════════════════════════════╗"
                          echo "║  DEPLOY — DATABASE                   ║"
                          echo "╚══════════════════════════════════════╝"
                          echo ""
                          echo "🗄️  Deploying database to DEV"
                          echo "   Build: #<+pipeline.variables.buildNumber> | Commit: <+pipeline.variables.commitSha>"
                          echo ""
                          echo "📋 Component: Database v<+pipeline.variables.dbVer>"
                          echo "   Change:   <+pipeline.variables.dbChange>"
                          echo ""
                          echo "🔗 CI Run: https://github.com/pdutta25/bikeshop-db/actions"
                          echo "   ✔ Build   — Schema compiled"
                          echo "   ✔ Lint    — SQL syntax validated"
                          echo "   ✔ Test    — Migration tests passed"
                          echo ""
                          sleep 2
                          echo "   Running schema diff... ✔"
                          sleep 2
                          echo "   Applying migrations..."
                          echo "     ✔ 001_create_products_table"
                          echo "     ✔ 002_create_categories_table"
                          echo "     ✔ 003_create_orders_table"
                          echo "     ✔ 004_create_customers_table"
                          sleep 2
                          echo "   Verifying integrity... ✔"
                          echo "   Seeding reference data... ✔"
                          echo ""
                          echo "✅ Database deployed to DEV"

              # ── Services & UI: each with own gate, running in parallel ──
              - parallel:
                  - stepGroup:
                      name: Services Track
                      identifier: Services_Track
                      steps:
                        - step:
                            name: Approve Services Deploy
                            identifier: Approve_Services_Deploy
                            type: HarnessApproval
                            timeout: 10s
                            spec:
                              approvalMessage: |-
                                ⚙️ Approving Services component for deployment to DEV
                                Services v<+pipeline.variables.svcVer> — <+pipeline.variables.svcChange>
                                CI: ✔ Build ✔ Lint ✔ Test — https://github.com/pdutta25/bikeshop-services/actions
                                Build: #<+pipeline.variables.buildNumber>
                              includePipelineExecutionHistory: true
                              approvers:
                                userGroups:
                                  - _project_all_users
                                minimumCount: 1
                                disallowPipelineExecutor: false
                              isAutoRejectEnabled: false
                            failureStrategies:
                              - onFailure:
                                  errors:
                                    - Timeout
                                  action:
                                    type: MarkAsSuccess
                        - step:
                            name: Deploy Services
                            identifier: Deploy_Services
                            type: ShellScript
                            timeout: 5m
                            spec:
                              shell: Bash
                              onDelegate: true
                              source:
                                type: Inline
                                spec:
                                  script: |-
                                    #!/bin/bash
                                    echo "╔══════════════════════════════════════╗"
                                    echo "║  DEPLOY — SERVICES (API)  [parallel] ║"
                                    echo "╚══════════════════════════════════════╝"
                                    echo ""
                                    echo "⚙️  Deploying API services to DEV"
                                    echo "   Build: #<+pipeline.variables.buildNumber> | Commit: <+pipeline.variables.commitSha>"
                                    echo ""
                                    echo "📋 Component: Services v<+pipeline.variables.svcVer>"
                                    echo "   Change:   <+pipeline.variables.svcChange>"
                                    echo ""
                                    echo "🔗 CI Run: https://github.com/pdutta25/bikeshop-services/actions"
                                    echo "   ✔ Build   — API routes compiled"
                                    echo "   ✔ Lint    — ESLint + type check passed"
                                    echo "   ✔ Test    — API tests passed (4/4)"
                                    echo ""
                                    sleep 2
                                    echo "   Deploying Next.js API routes..."
                                    echo "     ✔ /api/products"
                                    echo "     ✔ /api/categories"
                                    echo "     ✔ /api/orders"
                                    echo "     ✔ /api/cart"
                                    echo "     ✔ /api/health"
                                    sleep 2
                                    echo "   Health check... HTTP 200 ✔"
                                    echo ""
                                    echo "✅ Services deployed to DEV"
                  - stepGroup:
                      name: UI Track
                      identifier: UI_Track
                      steps:
                        - step:
                            name: Approve UI Deploy
                            identifier: Approve_UI_Deploy
                            type: HarnessApproval
                            timeout: 10s
                            spec:
                              approvalMessage: |-
                                🎨 Approving UI component for deployment to DEV
                                UI v<+pipeline.variables.uiVer> — <+pipeline.variables.uiChange>
                                CI: ✔ Build ✔ Lint ✔ Test — https://github.com/pdutta25/bikeshop-ui/actions
                                Build: #<+pipeline.variables.buildNumber>
                              includePipelineExecutionHistory: true
                              approvers:
                                userGroups:
                                  - _project_all_users
                                minimumCount: 1
                                disallowPipelineExecutor: false
                              isAutoRejectEnabled: false
                            failureStrategies:
                              - onFailure:
                                  errors:
                                    - Timeout
                                  action:
                                    type: MarkAsSuccess
                        - step:
                            name: Deploy UI
                            identifier: Deploy_UI
                            type: ShellScript
                            timeout: 5m
                            spec:
                              shell: Bash
                              onDelegate: true
                              source:
                                type: Inline
                                spec:
                                  script: |-
                                    #!/bin/bash
                                    echo "╔══════════════════════════════════════╗"
                                    echo "║  DEPLOY — UI (Storefront) [parallel] ║"
                                    echo "╚══════════════════════════════════════╝"
                                    echo ""
                                    echo "🎨 Deploying storefront UI to DEV"
                                    echo "   Build: #<+pipeline.variables.buildNumber> | Commit: <+pipeline.variables.commitSha>"
                                    echo ""
                                    echo "📋 Component: UI v<+pipeline.variables.uiVer>"
                                    echo "   Change:   <+pipeline.variables.uiChange>"
                                    echo ""
                                    echo "🔗 CI Run: https://github.com/pdutta25/bikeshop-ui/actions"
                                    echo "   ✔ Build   — Next.js compiled"
                                    echo "   ✔ Lint    — ESLint + Prettier passed"
                                    echo "   ✔ Test    — UI tests passed (4/4)"
                                    echo ""
                                    sleep 2
                                    echo "   Deploying static assets... ✔"
                                    sleep 2
                                    echo "   Deploying SSR pages..."
                                    echo "     ✔ Homepage"
                                    echo "     ✔ Product catalog"
                                    echo "     ✔ Product detail"
                                    echo "     ✔ Cart & Checkout"
                                    echo "     ✔ Admin dashboard"
                                    sleep 2
                                    echo "   CDN cache invalidation... ✔"
                                    echo "   Visual diff check... no regressions ✔"
                                    echo ""
                                    echo "✅ UI deployed to DEV"

              # ── DEV Smoke Tests ──
              - step:
                  name: DEV Smoke Tests
                  identifier: DEV_Smoke_Tests
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "🔍 DEV Smoke Tests"
                          echo ""
                          echo "   ✔ [DEV-01] Build artifact verified"
                          echo "   ✔ [DEV-02] Config validation passed"
                          echo "   ✔ [DEV-03] Service health simulated"
                          echo ""
                          echo "┌──────────────────────────────────────┐"
                          echo "│     DEV SMOKE TEST RESULTS           │"
                          echo "├──────────────────────────────────────┤"
                          echo "│ Total Tests:    3                    │"
                          echo "│ Passed:         3                    │"
                          echo "│ Failed:         0                    │"
                          echo "│ Status:         ✅ ALL PASSED        │"
                          echo "└──────────────────────────────────────┘"
                          echo ""
                          echo "✅ DEV smoke tests passed"

              # ── Certify DEV Build (Auto-Approve in 10s) ──
              - step:
                  name: Certify DEV Build
                  identifier: Certify_DEV_Build
                  type: HarnessApproval
                  timeout: 10s
                  spec:
                    approvalMessage: |-
                      ✅ Certifying all 3 components deployed successfully
                      Database v<+pipeline.variables.dbVer> | Services v<+pipeline.variables.svcVer> | UI v<+pipeline.variables.uiVer>
                      Build: #<+pipeline.variables.buildNumber>
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Timeout
                        action:
                          type: MarkAsSuccess

              # ── DEV Recap ──
              - step:
                  name: DEV Recap
                  identifier: DEV_Recap
                  type: ShellScript
                  timeout: 1m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo ""
                          echo "╔══════════════════════════════════════════════════════════════════╗"
                          echo "║                        DEV RECAP                                ║"
                          echo "║  Summary of what was deployed and verified in DEV.                ║"
                          echo "╚══════════════════════════════════════════════════════════════════╝"
                          echo ""
                          echo "── Components Deployed ─────────────────────────────────────────────"
                          echo "  ✅ Database  v<+pipeline.variables.dbVer>  — <+pipeline.variables.dbChange>"
                          echo "  ✅ Services  v<+pipeline.variables.svcVer>  — <+pipeline.variables.svcChange>"
                          echo "  ✅ UI        v<+pipeline.variables.uiVer>  — <+pipeline.variables.uiChange>"
                          echo ""
                          echo "── Verification ────────────────────────────────────────────────────"
                          echo "  Smoke Tests:    ✔ Passed (3/3)"
                          echo "  Certified:      ✔ Auto-certified"
                          echo ""
                          echo "── Context ─────────────────────────────────────────────────────────"
                          echo "  Triggered by:   <+pipeline.variables.triggeredBy>"
                          echo "  Trigger repo:   https://github.com/<+pipeline.variables.triggerRepo>"
                          echo "  Build:          #<+pipeline.variables.buildNumber>"
                          echo "  Commit:         <+pipeline.variables.commitSha>"
                          echo ""
                          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                          echo "  ✅ DEV PASSED — proceeding to SIT"
                          echo ""
        tags: {}

    # ════════════════════════════════════════════════════════════
    # SIT — Deploy and Certify (Auto-Approved)
    # ════════════════════════════════════════════════════════════
    - stage:
        name: SIT
        identifier: SIT
        type: Custom
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
        spec:
          execution:
            steps:
              # ── Gate: Approve Database Deploy ──
              - step:
                  name: Approve Database Deploy
                  identifier: SIT_Approve_Database_Deploy
                  type: HarnessApproval
                  timeout: 10s
                  spec:
                    approvalMessage: |-
                      🗄️ Approving Database component for deployment to SIT
                      Database v<+pipeline.variables.dbVer> — <+pipeline.variables.dbChange>
                      CI: ✔ Build ✔ Lint ✔ Test — https://github.com/pdutta25/bikeshop-db/actions
                      Build: #<+pipeline.variables.buildNumber>
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Timeout
                        action:
                          type: MarkAsSuccess

              # ── Deploy Database ──
              - step:
                  name: Deploy Database
                  identifier: SIT_Deploy_Database
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "╔══════════════════════════════════════╗"
                          echo "║  DEPLOY — DATABASE                   ║"
                          echo "╚══════════════════════════════════════╝"
                          echo ""
                          echo "🗄️  Deploying database to SIT"
                          echo "   Build: #<+pipeline.variables.buildNumber> | Commit: <+pipeline.variables.commitSha>"
                          echo ""
                          echo "📋 Component: Database v<+pipeline.variables.dbVer>"
                          echo "   Change:   <+pipeline.variables.dbChange>"
                          echo ""
                          echo "🔗 CI Run: https://github.com/pdutta25/bikeshop-db/actions"
                          echo "   ✔ Build   — Schema compiled"
                          echo "   ✔ Lint    — SQL syntax validated"
                          echo "   ✔ Test    — Migration tests passed"
                          echo ""
                          sleep 2
                          echo "   Running schema diff... ✔"
                          sleep 2
                          echo "   Applying migrations..."
                          echo "     ✔ 001_create_products_table"
                          echo "     ✔ 002_create_categories_table"
                          echo "     ✔ 003_create_orders_table"
                          echo "     ✔ 004_create_customers_table"
                          sleep 2
                          echo "   Verifying integrity... ✔"
                          echo "   Seeding reference data... ✔"
                          echo ""
                          echo "✅ Database deployed to SIT"

              # ── Services & UI: each with own gate, running in parallel ──
              - parallel:
                  - stepGroup:
                      name: Services Track
                      identifier: SIT_Services_Track
                      steps:
                        - step:
                            name: Approve Services Deploy
                            identifier: SIT_Approve_Services_Deploy
                            type: HarnessApproval
                            timeout: 10s
                            spec:
                              approvalMessage: |-
                                ⚙️ Approving Services component for deployment to SIT
                                Services v<+pipeline.variables.svcVer> — <+pipeline.variables.svcChange>
                                CI: ✔ Build ✔ Lint ✔ Test — https://github.com/pdutta25/bikeshop-services/actions
                                Build: #<+pipeline.variables.buildNumber>
                              includePipelineExecutionHistory: true
                              approvers:
                                userGroups:
                                  - _project_all_users
                                minimumCount: 1
                                disallowPipelineExecutor: false
                              isAutoRejectEnabled: false
                            failureStrategies:
                              - onFailure:
                                  errors:
                                    - Timeout
                                  action:
                                    type: MarkAsSuccess
                        - step:
                            name: Deploy Services
                            identifier: SIT_Deploy_Services
                            type: ShellScript
                            timeout: 5m
                            spec:
                              shell: Bash
                              onDelegate: true
                              source:
                                type: Inline
                                spec:
                                  script: |-
                                    #!/bin/bash
                                    echo "╔══════════════════════════════════════╗"
                                    echo "║  DEPLOY — SERVICES (API)  [parallel] ║"
                                    echo "╚══════════════════════════════════════╝"
                                    echo ""
                                    echo "⚙️  Deploying API services to SIT"
                                    echo "   Build: #<+pipeline.variables.buildNumber> | Commit: <+pipeline.variables.commitSha>"
                                    echo ""
                                    echo "📋 Component: Services v<+pipeline.variables.svcVer>"
                                    echo "   Change:   <+pipeline.variables.svcChange>"
                                    echo ""
                                    echo "🔗 CI Run: https://github.com/pdutta25/bikeshop-services/actions"
                                    echo "   ✔ Build   — API routes compiled"
                                    echo "   ✔ Lint    — ESLint + type check passed"
                                    echo "   ✔ Test    — API tests passed (4/4)"
                                    echo ""
                                    sleep 2
                                    echo "   Deploying Next.js API routes..."
                                    echo "     ✔ /api/products"
                                    echo "     ✔ /api/categories"
                                    echo "     ✔ /api/orders"
                                    echo "     ✔ /api/cart"
                                    echo "     ✔ /api/health"
                                    sleep 2
                                    echo "   Health check... HTTP 200 ✔"
                                    echo ""
                                    echo "✅ Services deployed to SIT"
                  - stepGroup:
                      name: UI Track
                      identifier: SIT_UI_Track
                      steps:
                        - step:
                            name: Approve UI Deploy
                            identifier: SIT_Approve_UI_Deploy
                            type: HarnessApproval
                            timeout: 10s
                            spec:
                              approvalMessage: |-
                                🎨 Approving UI component for deployment to SIT
                                UI v<+pipeline.variables.uiVer> — <+pipeline.variables.uiChange>
                                CI: ✔ Build ✔ Lint ✔ Test — https://github.com/pdutta25/bikeshop-ui/actions
                                Build: #<+pipeline.variables.buildNumber>
                              includePipelineExecutionHistory: true
                              approvers:
                                userGroups:
                                  - _project_all_users
                                minimumCount: 1
                                disallowPipelineExecutor: false
                              isAutoRejectEnabled: false
                            failureStrategies:
                              - onFailure:
                                  errors:
                                    - Timeout
                                  action:
                                    type: MarkAsSuccess
                        - step:
                            name: Deploy UI
                            identifier: SIT_Deploy_UI
                            type: ShellScript
                            timeout: 5m
                            spec:
                              shell: Bash
                              onDelegate: true
                              source:
