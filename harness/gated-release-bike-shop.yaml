                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo ""
                          echo "╔══════════════════════════════════════════════════════════════════╗"
                          echo "║                        PROD RECAP                               ║"
                          echo "║  Summary of what was deployed and verified in PROD.               ║"
