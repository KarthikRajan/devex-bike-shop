                                    sleep 2
                                    echo "   CDN cache invalidation... ✔"
                                    echo "   Visual diff check... no regressions ✔"
                                    echo ""
                                    echo "✅ UI deployed to PROD"

              # ── PROD Smoke Tests ──
              - step:
                  name: PROD Smoke Tests
                  identifier: PROD_Smoke_Tests
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
