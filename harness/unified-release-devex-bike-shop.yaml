              # ── Certify PROD Deploys (Auto-Approve in 10s) ──
              - step:
                  name: Certify PROD Deploys
                  identifier: Certify_PROD_Deploys
                  type: HarnessApproval
                  timeout: 10s
                  spec:
                    approvalMessage: |-
                      ✅ Certifying all 3 components deployed successfully to PROD
                      Database v<+pipeline.variables.dbVer> | Services v<+pipeline.variables.svcVer> | UI v<+pipeline.variables.uiVer>
                      Build: #<+pipeline.variables.buildNumber>
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Timeout
                        action:
                          type: MarkAsSuccess

