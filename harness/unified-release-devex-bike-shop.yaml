pipeline:
  name: unified-release-devex-bike-shop
  identifier: unifiedreleasedevexbikeshop
  projectIdentifier: devexbikeshop
  orgIdentifier: default
  tags: {}
  variables:
    - name: commitSha
      type: String
      default: "unknown"
      value: <+input>
    - name: buildNumber
      type: String
      default: "0"
      value: <+input>
    - name: branch
      type: String
      default: "main"
      value: <+input>
    - name: prNumber
      type: String
      default: "none"
      value: <+input>
    - name: triggeredBy
      type: String
      default: "GitHub Actions"
      value: <+input>
    - name: repoUrl
      type: String
      default: "https://github.com/devx-bike-shop"
      value: <+input>
    - name: runId
      type: String
      default: "0"
      value: <+input>
    - name: dbVer
      type: String
      default: "unknown"
      value: <+input>
    - name: dbChange
      type: String
      default: "unknown"
      value: <+input>
    - name: svcVer
      type: String
      default: "unknown"
      value: <+input>
    - name: svcChange
      type: String
      default: "unknown"
      value: <+input>
    - name: uiVer
      type: String
      default: "unknown"
      value: <+input>
    - name: uiChange
      type: String
      default: "unknown"
      value: <+input>
    - name: triggerRepo
      type: String
      default: "unknown"
      value: <+input>
  stages:
    # ════════════════════════════════════════════════════════════
    # DEV — One gate for DB, then Services + UI parallel (no gates)
    # ════════════════════════════════════════════════════════════
    - stage:
        name: DEV
        identifier: DEV
        type: Custom
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
        spec:
          execution:
            steps:
              # ── Pipeline Briefing ──
              - step:
                  name: Pipeline Briefing
                  identifier: Pipeline_Briefing
                  type: ShellScript
                  timeout: 1m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo ""
                          echo "╔══════════════════════════════════════════════════════════════════╗"
                          echo "║                      PIPELINE BRIEFING                            ║"
                          echo "║  A pre-execution summary of what this release will deploy,        ║"
                          echo "║  which components are included, and the release strategy.         ║"
                          echo "╚══════════════════════════════════════════════════════════════════╝"
                          echo ""
                          echo "── Pipeline ──────────────────────────────────────────────────────"
                          echo "  Name:           unified-release-devex-bike-shop"
                          echo "  Pattern:        Unified Release"
                          echo "  Strategy:       One approval, all components flow —"
                          echo "                  ship fast when everything's green."
                          echo "  Target:         DEV"
                          echo "  Build:          #<+pipeline.variables.buildNumber>"
                          echo "  Commit:         <+pipeline.variables.commitSha>"
                          echo "  Branch:         <+pipeline.variables.branch>"
                          echo "  Triggered by:   <+pipeline.variables.triggeredBy>"
                          echo "  Trigger repo:   https://github.com/<+pipeline.variables.triggerRepo>"
                          echo ""
                          echo "── Components in this Release ────────────────────────────────────"
                          echo "  🗄️  Database     → bikeshop-db         v<+pipeline.variables.dbVer>"
                          echo "                     <+pipeline.variables.dbChange>"
                          echo "  ⚙️  Services     → bikeshop-services   v<+pipeline.variables.svcVer>"
                          echo "                     <+pipeline.variables.svcChange>"
                          echo "  🎨  UI           → bikeshop-ui         v<+pipeline.variables.uiVer>"
                          echo "                     <+pipeline.variables.uiChange>"
                          echo ""
                          echo "── Release Flow ──────────────────────────────────────────────────"
                          echo "  Approve All  →  Deploy DB  →  Deploy Svc + UI (parallel)"
                          echo "       ↓"
                          echo "  Smoke Tests  →  Certify  →  Pipeline Debrief"
                          echo ""
                          echo "── Source Repos ──────────────────────────────────────────────────"
                          echo "  https://github.com/pdutta25/bikeshop-db"
                          echo "  https://github.com/pdutta25/bikeshop-services"
                          echo "  https://github.com/pdutta25/bikeshop-ui"
                          echo ""
                          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                          echo "  Proceeding to approval and deployments..."
                          echo ""

              # ── Gate: Approve Deploys ──
              - step:
                  name: Approve Deploys
                  identifier: Approve_Deploys
                  type: HarnessApproval
                  timeout: 10s
                  spec:
                    approvalMessage: |-
                      🚀 Approving all 3 components for deployment to DEV
                      Database v<+pipeline.variables.dbVer> | Services v<+pipeline.variables.svcVer> | UI v<+pipeline.variables.uiVer>
                      CI: ✔ Build ✔ Lint ✔ Test — all 3 repos passed
                      https://github.com/pdutta25/bikeshop-db/actions | bikeshop-services/actions | bikeshop-ui/actions
                      Build: #<+pipeline.variables.buildNumber>
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Timeout
                        action:
                          type: MarkAsSuccess

              # ── Deploy Database ──
              - step:
                  name: Deploy Database
                  identifier: Deploy_Database
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "╔══════════════════════════════════════╗"
                          echo "║  DEPLOY — DATABASE                   ║"
                          echo "╚══════════════════════════════════════╝"
                          echo ""
                          echo "🗄️  Deploying database to DEV"
                          echo "   Build: #<+pipeline.variables.buildNumber> | Commit: <+pipeline.variables.commitSha>"
                          echo ""
                          echo "📋 Component: Database v<+pipeline.variables.dbVer>"
                          echo "   Change:   <+pipeline.variables.dbChange>"
                          echo ""
                          echo "🔗 CI Run: https://github.com/pdutta25/bikeshop-db/actions"
                          echo "   ✔ Build   — Schema compiled"
                          echo "   ✔ Lint    — SQL syntax validated"
                          echo "   ✔ Test    — Migration tests passed"
                          echo ""
                          sleep 2
                          echo "   Running schema diff... ✔"
                          sleep 2
                          echo "   Applying migrations..."
                          echo "     ✔ 001_create_products_table"
                          echo "     ✔ 002_create_categories_table"
                          echo "     ✔ 003_create_orders_table"
                          echo "     ✔ 004_create_customers_table"
                          sleep 2
                          echo "   Verifying integrity... ✔"
                          echo "   Seeding reference data... ✔"
                          echo ""
                          echo "✅ Database deployed to DEV"

              # ── Deploy Services & UI in Parallel (no gates) ──
              - parallel:
                  - step:
                      name: Deploy Services
                      identifier: Deploy_Services
                      type: ShellScript
                      timeout: 5m
                      spec:
                        shell: Bash
                        onDelegate: true
                        source:
                          type: Inline
                          spec:
                            script: |-
                              #!/bin/bash
                              echo "╔══════════════════════════════════════╗"
                              echo "║  DEPLOY — SERVICES (API)  [parallel] ║"
                              echo "╚══════════════════════════════════════╝"
                              echo ""
                              echo "⚙️  Deploying API services to DEV"
                              echo "   Build: #<+pipeline.variables.buildNumber> | Commit: <+pipeline.variables.commitSha>"
                              echo ""
                              echo "📋 Component: Services v<+pipeline.variables.svcVer>"
                              echo "   Change:   <+pipeline.variables.svcChange>"
                              echo ""
                              echo "🔗 CI Run: https://github.com/pdutta25/bikeshop-services/actions"
                              echo "   ✔ Build   — API routes compiled"
                              echo "   ✔ Lint    — ESLint + type check passed"
                              echo "   ✔ Test    — API tests passed (4/4)"
                              echo ""
                              sleep 2
                              echo "   Deploying Next.js API routes..."
                              echo "     ✔ /api/products"
                              echo "     ✔ /api/categories"
                              echo "     ✔ /api/orders"
                              echo "     ✔ /api/cart"
                              echo "     ✔ /api/health"
                              sleep 2
                              echo "   Health check... HTTP 200 ✔"
                              echo ""
                              echo "✅ Services deployed to DEV"
                  - step:
                      name: Deploy UI
                      identifier: Deploy_UI
                      type: ShellScript
                      timeout: 5m
                      spec:
                        shell: Bash
                        onDelegate: true
                        source:
                          type: Inline
                          spec:
                            script: |-
                              #!/bin/bash
                              echo "╔══════════════════════════════════════╗"
                              echo "║  DEPLOY — UI (Storefront) [parallel] ║"
                              echo "╚══════════════════════════════════════╝"
                              echo ""
                              echo "🎨 Deploying storefront UI to DEV"
                              echo "   Build: #<+pipeline.variables.buildNumber> | Commit: <+pipeline.variables.commitSha>"
                              echo ""
                              echo "📋 Component: UI v<+pipeline.variables.uiVer>"
                              echo "   Change:   <+pipeline.variables.uiChange>"
                              echo ""
                              echo "🔗 CI Run: https://github.com/pdutta25/bikeshop-ui/actions"
                              echo "   ✔ Build   — Next.js compiled"
                              echo "   ✔ Lint    — ESLint + Prettier passed"
                              echo "   ✔ Test    — UI tests passed (4/4)"
                              echo ""
                              sleep 2
                              echo "   Deploying static assets... ✔"
                              sleep 2
                              echo "   Deploying SSR pages..."
                              echo "     ✔ Homepage"
                              echo "     ✔ Product catalog"
                              echo "     ✔ Product detail"
                              echo "     ✔ Cart & Checkout"
                              echo "     ✔ Admin dashboard"
                              sleep 2
                              echo "   CDN cache invalidation... ✔"
                              echo "   Visual diff check... no regressions ✔"
                              echo ""
                              echo "✅ UI deployed to DEV"

              # ── DEV Smoke Tests ──
              - step:
                  name: DEV Smoke Tests
                  identifier: DEV_Smoke_Tests
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "🔍 DEV Smoke Tests"
                          echo ""
                          echo "   ✔ [DEV-01] Build artifact verified"
                          echo "   ✔ [DEV-02] Config validation passed"
                          echo "   ✔ [DEV-03] Service health simulated"
                          echo ""
                          echo "┌──────────────────────────────────────┐"
                          echo "│     DEV SMOKE TEST RESULTS           │"
                          echo "├──────────────────────────────────────┤"
                          echo "│ Total Tests:    3                    │"
                          echo "│ Passed:         3                    │"
                          echo "│ Failed:         0                    │"
                          echo "│ Status:         ✅ ALL PASSED        │"
                          echo "└──────────────────────────────────────┘"
                          echo ""
                          echo "✅ DEV smoke tests passed"

              # ── Certify Deploys (Auto-Approve in 10s) ──
              - step:
                  name: Certify Deploys
                  identifier: Certify_Deploys
                  type: HarnessApproval
                  timeout: 10s
                  spec:
                    approvalMessage: |-
                      ✅ Certifying all 3 components deployed successfully
                      Database v<+pipeline.variables.dbVer> | Services v<+pipeline.variables.svcVer> | UI v<+pipeline.variables.uiVer>
                      Build: #<+pipeline.variables.buildNumber>
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Timeout
                        action:
                          type: MarkAsSuccess

              # ── DEV Summary ──
              - step:
                  name: DEV Summary
                  identifier: DEV_Summary
                  type: ShellScript
                  timeout: 1m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo ""
                          echo "✅ DEV PASSED — proceeding to SIT"
                          echo ""
        tags: {}

    # ════════════════════════════════════════════════════════════
    # SIT — Integration testing environment
    # ════════════════════════════════════════════════════════════
    - stage:
        name: SIT
        identifier: SIT
        type: Custom
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
        spec:
          execution:
            steps:
              # ── Gate: Approve SIT Deploys ──
              - step:
                  name: Approve SIT Deploys
                  identifier: Approve_SIT_Deploys
                  type: HarnessApproval
                  timeout: 10s
                  spec:
                    approvalMessage: |-
                      🚀 Approving all 3 components for deployment to SIT
                      Database v<+pipeline.variables.dbVer> | Services v<+pipeline.variables.svcVer> | UI v<+pipeline.variables.uiVer>
                      CI: ✔ Build ✔ Lint ✔ Test — all 3 repos passed
                      https://github.com/pdutta25/bikeshop-db/actions | bikeshop-services/actions | bikeshop-ui/actions
                      Build: #<+pipeline.variables.buildNumber>
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Timeout
                        action:
                          type: MarkAsSuccess

              # ── Deploy Database to SIT ──
              - step:
                  name: Deploy Database
                  identifier: SIT_Deploy_Database
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "╔══════════════════════════════════════╗"
                          echo "║  DEPLOY — DATABASE                   ║"
                          echo "╚══════════════════════════════════════╝"
                          echo ""
                          echo "🗄️  Deploying database to SIT"
                          echo "   Build: #<+pipeline.variables.buildNumber> | Commit: <+pipeline.variables.commitSha>"
                          echo ""
                          echo "📋 Component: Database v<+pipeline.variables.dbVer>"
                          echo "   Change:   <+pipeline.variables.dbChange>"
                          echo ""
                          echo "🔗 CI Run: https://github.com/pdutta25/bikeshop-db/actions"
                          echo "   ✔ Build   — Schema compiled"
                          echo "   ✔ Lint    — SQL syntax validated"
                          echo "   ✔ Test    — Migration tests passed"
                          echo ""
                          sleep 2
                          echo "   Running schema diff... ✔"
                          sleep 2
                          echo "   Applying migrations..."
                          echo "     ✔ 001_create_products_table"
                          echo "     ✔ 002_create_categories_table"
                          echo "     ✔ 003_create_orders_table"
                          echo "     ✔ 004_create_customers_table"
                          sleep 2
                          echo "   Verifying integrity... ✔"
                          echo "   Seeding reference data... ✔"
                          echo ""
                          echo "✅ Database deployed to SIT"

              # ── Deploy Services & UI in Parallel to SIT ──
              - parallel:
                  - step:
                      name: Deploy Services
                      identifier: SIT_Deploy_Services
                      type: ShellScript
                      timeout: 5m
                      spec:
                        shell: Bash
                        onDelegate: true
                        source:
                          type: Inline
                          spec:
                            script: |-
                              #!/bin/bash
                              echo "╔══════════════════════════════════════╗"
                              echo "║  DEPLOY — SERVICES (API)  [parallel] ║"
                              echo "╚══════════════════════════════════════╝"
                              echo ""
                              echo "⚙️  Deploying API services to SIT"
                              echo "   Build: #<+pipeline.variables.buildNumber> | Commit: <+pipeline.variables.commitSha>"
                              echo ""
                              echo "📋 Component: Services v<+pipeline.variables.svcVer>"
                              echo "   Change:   <+pipeline.variables.svcChange>"
                              echo ""
                              echo "🔗 CI Run: https://github.com/pdutta25/bikeshop-services/actions"
                              echo "   ✔ Build   — API routes compiled"
                              echo "   ✔ Lint    — ESLint + type check passed"
                              echo "   ✔ Test    — API tests passed (4/4)"
                              echo ""
                              sleep 2
                              echo "   Deploying Next.js API routes..."
                              echo "     ✔ /api/products"
                              echo "     ✔ /api/categories"
                              echo "     ✔ /api/orders"
                              echo "     ✔ /api/cart"
                              echo "     ✔ /api/health"
                              sleep 2
                              echo "   Health check... HTTP 200 ✔"
                              echo ""
                              echo "✅ Services deployed to SIT"
                  - step:
                      name: Deploy UI
                      identifier: SIT_Deploy_UI
                      type: ShellScript
                      timeout: 5m
                      spec:
                        shell: Bash
                        onDelegate: true
                        source:
                          type: Inline
                          spec:
                            script: |-
                              #!/bin/bash
                              echo "╔══════════════════════════════════════╗"
                              echo "║  DEPLOY — UI (Storefront) [parallel] ║"
                              echo "╚══════════════════════════════════════╝"
                              echo ""
                              echo "🎨 Deploying storefront UI to SIT"
                              echo "   Build: #<+pipeline.variables.buildNumber> | Commit: <+pipeline.variables.commitSha>"
                              echo ""
                              echo "📋 Component: UI v<+pipeline.variables.uiVer>"
                              echo "   Change:   <+pipeline.variables.uiChange>"
                              echo ""
                              echo "🔗 CI Run: https://github.com/pdutta25/bikeshop-ui/actions"
                              echo "   ✔ Build   — Next.js compiled"
                              echo "   ✔ Lint    — ESLint + Prettier passed"
                              echo "   ✔ Test    — UI tests passed (4/4)"
                              echo ""
                              sleep 2
                              echo "   Deploying static assets... ✔"
                              sleep 2
                              echo "   Deploying SSR pages..."
                              echo "     ✔ Homepage"
                              echo "     ✔ Product catalog"
                              echo "     ✔ Product detail"
                              echo "     ✔ Cart & Checkout"
                              echo "     ✔ Admin dashboard"
                              sleep 2
                              echo "   CDN cache invalidation... ✔"
                              echo "   Visual diff check... no regressions ✔"
                              echo ""
                              echo "✅ UI deployed to SIT"

              # ── SIT Integration Tests ──
              - step:
                  name: SIT Integration Tests
                  identifier: SIT_Integration_Tests
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "🔍 SIT Integration Tests"
                          echo ""
                          echo "   ✔ [SIT-01] End-to-end order flow"
                          echo "   ✔ [SIT-02] Cross-service API contracts"
                          echo "   ✔ [SIT-03] Database referential integrity"
                          echo "   ✔ [SIT-04] UI-to-API integration"
                          echo ""
                          echo "┌──────────────────────────────────────┐"
                          echo "│   SIT INTEGRATION TEST RESULTS       │"
                          echo "├──────────────────────────────────────┤"
                          echo "│ Total Tests:    4                    │"
                          echo "│ Passed:         4                    │"
                          echo "│ Failed:         0                    │"
                          echo "│ Status:         ✅ ALL PASSED        │"
                          echo "└──────────────────────────────────────┘"
                          echo ""
                          echo "✅ SIT integration tests passed"

              # ── Certify SIT Deploys (Auto-Approve in 10s) ──
              - step:
                  name: Certify SIT Deploys
                  identifier: Certify_SIT_Deploys
                  type: HarnessApproval
                  timeout: 10s
                  spec:
                    approvalMessage: |-
                      ✅ Certifying all 3 components deployed successfully to SIT
                      Database v<+pipeline.variables.dbVer> | Services v<+pipeline.variables.svcVer> | UI v<+pipeline.variables.uiVer>
                      Build: #<+pipeline.variables.buildNumber>
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Timeout
                        action:
                          type: MarkAsSuccess

              # ── SIT Summary ──
              - step:
                  name: SIT Summary
                  identifier: SIT_Summary
                  type: ShellScript
                  timeout: 1m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo ""
                          echo "✅ SIT PASSED — proceeding to PROD"
                          echo ""
        tags: {}

    # ════════════════════════════════════════════════════════════
    # PROD — Production deployment
    # ════════════════════════════════════════════════════════════
    - stage:
        name: PROD
        identifier: PROD
        type: Custom
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
        spec:
          execution:
            steps:
              # ── PROD Approval ──
              - step:
                  name: PROD Approval
                  identifier: PROD_Approval
                  type: HarnessApproval
                  timeout: 10s
                  spec:
                    approvalMessage: |-
                      🚨 PRODUCTION DEPLOYMENT APPROVAL
                      All 3 components for PROD
                      Database v<+pipeline.variables.dbVer> | Services v<+pipeline.variables.svcVer> | UI v<+pipeline.variables.uiVer>
                      CI: ✔ Build ✔ Lint ✔ Test — all 3 repos passed
                      DEV ✅ | SIT ✅ — Ready for PROD?
                      Build: #<+pipeline.variables.buildNumber>
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Timeout
                        action:
                          type: MarkAsSuccess

              # ── Deploy Database to PROD ──
              - step:
                  name: Deploy Database
                  identifier: PROD_Deploy_Database
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "╔══════════════════════════════════════╗"
                          echo "║  DEPLOY — DATABASE                   ║"
                          echo "╚══════════════════════════════════════╝"
                          echo ""
                          echo "🗄️  Deploying database to PROD"
                          echo "   Build: #<+pipeline.variables.buildNumber> | Commit: <+pipeline.variables.commitSha>"
                          echo ""
                          echo "📋 Component: Database v<+pipeline.variables.dbVer>"
                          echo "   Change:   <+pipeline.variables.dbChange>"
                          echo ""
                          echo "🔗 CI Run: https://github.com/pdutta25/bikeshop-db/actions"
                          echo "   ✔ Build   — Schema compiled"
                          echo "   ✔ Lint    — SQL syntax validated"
                          echo "   ✔ Test    — Migration tests passed"
                          echo ""
                          sleep 2
                          echo "   Running schema diff... ✔"
                          sleep 2
                          echo "   Applying migrations..."
                          echo "     ✔ 001_create_products_table"
                          echo "     ✔ 002_create_categories_table"
                          echo "     ✔ 003_create_orders_table"
                          echo "     ✔ 004_create_customers_table"
                          sleep 2
                          echo "   Verifying integrity... ✔"
                          echo "   Seeding reference data... ✔"
                          echo ""
                          echo "✅ Database deployed to PROD"

              # ── Deploy Services & UI in Parallel to PROD ──
              - parallel:
                  - step:
                      name: Deploy Services
                      identifier: PROD_Deploy_Services
