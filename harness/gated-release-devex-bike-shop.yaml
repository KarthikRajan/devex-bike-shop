pipeline:
  name: gated-release-devex-bike-shop
  identifier: gatedreleasedevexbikeshop
  projectIdentifier: devexbikeshop
  orgIdentifier: default
  tags: {}
  variables:
    - name: commitSha
      type: String
      default: "unknown"
      value: <+input>
    - name: buildNumber
      type: String
      default: "0"
      value: <+input>
    - name: branch
      type: String
      default: "main"
      value: <+input>
    - name: prNumber
      type: String
      default: "none"
      value: <+input>
    - name: triggeredBy
      type: String
      default: "GitHub Actions"
      value: <+input>
    - name: repoUrl
      type: String
      default: "https://github.com/devx-bike-shop"
      value: <+input>
    - name: runId
      type: String
      default: "0"
      value: <+input>
    - name: dbVer
      type: String
      default: "unknown"
      value: <+input>
    - name: dbChange
      type: String
      default: "unknown"
      value: <+input>
    - name: svcVer
      type: String
      default: "unknown"
      value: <+input>
    - name: svcChange
      type: String
      default: "unknown"
      value: <+input>
    - name: uiVer
      type: String
      default: "unknown"
      value: <+input>
    - name: uiChange
      type: String
      default: "unknown"
      value: <+input>
  stages:
    # в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
    # DEV вҖ” Deploy and Certify (Auto-Approved)
    # в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
    - stage:
        name: DEV
        identifier: DEV
        type: Custom
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
        spec:
          execution:
            steps:
              # в”Җв”Җ Gate: Approve Database Deploy в”Җв”Җ
              - step:
                  name: Approve Database Deploy
                  identifier: Approve_Database_Deploy
                  type: HarnessApproval
                  timeout: 10s
                  spec:
                    approvalMessage: |-
                      рҹ—„пёҸ Approving Database component for deployment to DEV
                      Database v<+pipeline.variables.dbVer> вҖ” <+pipeline.variables.dbChange>
                      CI: вң” Build вң” Lint вң” Test вҖ” https://github.com/pdutta25/bikeshop-db/actions
                      Build: #<+pipeline.variables.buildNumber>
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Timeout
                        action:
                          type: MarkAsSuccess

              # в”Җв”Җ Deploy Database в”Җв”Җ
              - step:
                  name: Deploy Database
                  identifier: Deploy_Database
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—"
                          echo "в•‘  DEPLOY вҖ” DATABASE                   в•‘"
                          echo "в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ"
                          echo ""
                          echo "рҹ—„пёҸ  Deploying database to DEV"
                          echo "   Build: #<+pipeline.variables.buildNumber> | Commit: <+pipeline.variables.commitSha>"
                          echo ""
                          echo "рҹ“Ӣ Component: Database v<+pipeline.variables.dbVer>"
                          echo "   Change:   <+pipeline.variables.dbChange>"
                          echo ""
                          echo "рҹ”— CI Run: https://github.com/pdutta25/bikeshop-db/actions"
                          echo "   вң” Build   вҖ” Schema compiled"
                          echo "   вң” Lint    вҖ” SQL syntax validated"
                          echo "   вң” Test    вҖ” Migration tests passed"
                          echo ""
                          sleep 2
                          echo "   Running schema diff... вң”"
                          sleep 2
                          echo "   Applying migrations..."
                          echo "     вң” 001_create_products_table"
                          echo "     вң” 002_create_categories_table"
                          echo "     вң” 003_create_orders_table"
                          echo "     вң” 004_create_customers_table"
                          sleep 2
                          echo "   Verifying integrity... вң”"
                          echo "   Seeding reference data... вң”"
                          echo ""
                          echo "вң… Database deployed to DEV"

              # в”Җв”Җ Services & UI: each with own gate, running in parallel в”Җв”Җ
              - parallel:
                  - stepGroup:
                      name: Services Track
                      identifier: Services_Track
                      steps:
                        - step:
                            name: Approve Services Deploy
                            identifier: Approve_Services_Deploy
                            type: HarnessApproval
                            timeout: 10s
                            spec:
                              approvalMessage: |-
                                вҡҷпёҸ Approving Services component for deployment to DEV
                                Services v<+pipeline.variables.svcVer> вҖ” <+pipeline.variables.svcChange>
                                CI: вң” Build вң” Lint вң” Test вҖ” https://github.com/pdutta25/bikeshop-services/actions
                                Build: #<+pipeline.variables.buildNumber>
                              includePipelineExecutionHistory: true
                              approvers:
                                userGroups:
                                  - _project_all_users
                                minimumCount: 1
                                disallowPipelineExecutor: false
                              isAutoRejectEnabled: false
                            failureStrategies:
                              - onFailure:
                                  errors:
                                    - Timeout
                                  action:
                                    type: MarkAsSuccess
                        - step:
                            name: Deploy Services
                            identifier: Deploy_Services
                            type: ShellScript
                            timeout: 5m
                            spec:
                              shell: Bash
                              onDelegate: true
                              source:
                                type: Inline
                                spec:
                                  script: |-
                                    #!/bin/bash
                                    echo "в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—"
                                    echo "в•‘  DEPLOY вҖ” SERVICES (API)  [parallel] в•‘"
                                    echo "в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ"
                                    echo ""
                                    echo "вҡҷпёҸ  Deploying API services to DEV"
                                    echo "   Build: #<+pipeline.variables.buildNumber> | Commit: <+pipeline.variables.commitSha>"
                                    echo ""
                                    echo "рҹ“Ӣ Component: Services v<+pipeline.variables.svcVer>"
                                    echo "   Change:   <+pipeline.variables.svcChange>"
                                    echo ""
                                    echo "рҹ”— CI Run: https://github.com/pdutta25/bikeshop-services/actions"
                                    echo "   вң” Build   вҖ” API routes compiled"
                                    echo "   вң” Lint    вҖ” ESLint + type check passed"
                                    echo "   вң” Test    вҖ” API tests passed (4/4)"
                                    echo ""
                                    sleep 2
                                    echo "   Deploying Next.js API routes..."
                                    echo "     вң” /api/products"
                                    echo "     вң” /api/categories"
                                    echo "     вң” /api/orders"
                                    echo "     вң” /api/cart"
                                    echo "     вң” /api/health"
                                    sleep 2
                                    echo "   Health check... HTTP 200 вң”"
                                    echo ""
                                    echo "вң… Services deployed to DEV"
                  - stepGroup:
                      name: UI Track
                      identifier: UI_Track
                      steps:
                        - step:
                            name: Approve UI Deploy
                            identifier: Approve_UI_Deploy
                            type: HarnessApproval
                            timeout: 10s
                            spec:
                              approvalMessage: |-
                                рҹҺЁ Approving UI component for deployment to DEV
                                UI v<+pipeline.variables.uiVer> вҖ” <+pipeline.variables.uiChange>
                                CI: вң” Build вң” Lint вң” Test вҖ” https://github.com/pdutta25/bikeshop-ui/actions
                                Build: #<+pipeline.variables.buildNumber>
                              includePipelineExecutionHistory: true
                              approvers:
                                userGroups:
                                  - _project_all_users
                                minimumCount: 1
                                disallowPipelineExecutor: false
                              isAutoRejectEnabled: false
                            failureStrategies:
                              - onFailure:
                                  errors:
                                    - Timeout
                                  action:
                                    type: MarkAsSuccess
                        - step:
                            name: Deploy UI
                            identifier: Deploy_UI
                            type: ShellScript
                            timeout: 5m
                            spec:
                              shell: Bash
                              onDelegate: true
                              source:
                                type: Inline
                                spec:
                                  script: |-
                                    #!/bin/bash
                                    echo "в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—"
                                    echo "в•‘  DEPLOY вҖ” UI (Storefront) [parallel] в•‘"
                                    echo "в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ"
                                    echo ""
                                    echo "рҹҺЁ Deploying storefront UI to DEV"
                                    echo "   Build: #<+pipeline.variables.buildNumber> | Commit: <+pipeline.variables.commitSha>"
                                    echo ""
                                    echo "рҹ“Ӣ Component: UI v<+pipeline.variables.uiVer>"
                                    echo "   Change:   <+pipeline.variables.uiChange>"
                                    echo ""
                                    echo "рҹ”— CI Run: https://github.com/pdutta25/bikeshop-ui/actions"
                                    echo "   вң” Build   вҖ” Next.js compiled"
                                    echo "   вң” Lint    вҖ” ESLint + Prettier passed"
                                    echo "   вң” Test    вҖ” UI tests passed (4/4)"
                                    echo ""
                                    sleep 2
                                    echo "   Deploying static assets... вң”"
                                    sleep 2
                                    echo "   Deploying SSR pages..."
                                    echo "     вң” Homepage"
                                    echo "     вң” Product catalog"
                                    echo "     вң” Product detail"
                                    echo "     вң” Cart & Checkout"
                                    echo "     вң” Admin dashboard"
                                    sleep 2
                                    echo "   CDN cache invalidation... вң”"
                                    echo "   Visual diff check... no regressions вң”"
                                    echo ""
                                    echo "вң… UI deployed to DEV"

              # в”Җв”Җ DEV Smoke Tests в”Җв”Җ
              - step:
                  name: DEV Smoke Tests
                  identifier: DEV_Smoke_Tests
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "рҹ”Қ DEV Smoke Tests"
                          echo ""
                          echo "   вң” [DEV-01] Build artifact verified"
                          echo "   вң” [DEV-02] Config validation passed"
                          echo "   вң” [DEV-03] Service health simulated"
                          echo ""
                          echo "в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ"
                          echo "в”Ӯ     DEV SMOKE TEST RESULTS           в”Ӯ"
                          echo "в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө"
                          echo "в”Ӯ Total Tests:    3                    в”Ӯ"
                          echo "в”Ӯ Passed:         3                    в”Ӯ"
                          echo "в”Ӯ Failed:         0                    в”Ӯ"
                          echo "в”Ӯ Status:         вң… ALL PASSED        в”Ӯ"
                          echo "в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ"
                          echo ""
                          echo "вң… DEV smoke tests passed"

              # в”Җв”Җ Certify DEV Build (Auto-Approve in 10s) в”Җв”Җ
              - step:
                  name: Certify DEV Build
                  identifier: Certify_DEV_Build
                  type: HarnessApproval
                  timeout: 10s
                  spec:
                    approvalMessage: |-
                      вң… Certifying all 3 components deployed successfully
                      Database v<+pipeline.variables.dbVer> | Services v<+pipeline.variables.svcVer> | UI v<+pipeline.variables.uiVer>
                      Build: #<+pipeline.variables.buildNumber>
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Timeout
                        action:
                          type: MarkAsSuccess

              # в”Җв”Җ DEV Telemetry Report в”Җв”Җ
              - step:
                  name: DEV Telemetry
                  identifier: DEV_Telemetry
                  type: ShellScript
                  timeout: 1m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                          EPOCH=$(date +%s)
                          T0=$((EPOCH - 87))
                          T_DB_APPROVE=$((T0 + 2))
                          T_DB_APPROVED=$((T0 + 12))
                          T_DB_START=$((T0 + 13))
                          T_DB_END=$((T0 + 25))
                          T_SVC_APPROVE=$((T0 + 26))
                          T_SVC_APPROVED=$((T0 + 36))
                          T_SVC_START=$((T0 + 37))
                          T_SVC_END=$((T0 + 49))
                          T_UI_APPROVE=$((T0 + 26))
                          T_UI_APPROVED=$((T0 + 36))
                          T_UI_START=$((T0 + 37))
                          T_UI_END=$((T0 + 55))
                          T_SMOKE_START=$((T0 + 56))
                          T_SMOKE_END=$((T0 + 62))
                          T_CERT=$((T0 + 72))
                          FMT="%Y-%m-%dT%H:%M:%SZ"
                          fmt() { date -u -d @$1 +"$FMT" 2>/dev/null || date -u -r $1 +"$FMT"; }
                          echo ""
                          echo "в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—"
                          echo "в•‘               TELEMETRY вҖ” GATED RELEASE (DEV)                    в•‘"
                          echo "в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ"
                          echo ""
                          echo "в”Җв”Җ 1. Pipeline в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ"
                          echo "  Pipeline:       gated-release-devex-bike-shop"
                          echo "  Identifier:     gatedreleasedevexbikeshop"
                          echo "  Execution ID:   <+pipeline.executionId>"
                          echo "  Pattern:        Gated (independent component approvals)"
                          echo "  Stage:          DEV"
                          echo "  Build:          #<+pipeline.variables.buildNumber>"
                          echo "  Commit:         <+pipeline.variables.commitSha>"
                          echo "  Branch:         <+pipeline.variables.branch>"
                          echo "  Triggered by:   <+pipeline.variables.triggeredBy>"
                          echo "  Trigger source: Repository dispatch (component-updated)"
                          echo "  Stage started:  $(fmt $T0)"
                          echo "  Stage ended:    $NOW"
                          echo "  Stage duration: ~$((EPOCH - T0))s"
                          echo "  Stage result:   PASSED"
                          echo ""
                          echo "в”Җв”Җ 2. Components в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ"
                          echo ""
                          echo "  в”Ңв”Җ Database в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ"
                          echo "  в”Ӯ Version:        v<+pipeline.variables.dbVer>"
                          echo "  в”Ӯ Change:         <+pipeline.variables.dbChange>"
                          echo "  в”Ӯ Source repo:    https://github.com/pdutta25/bikeshop-db"
                          echo "  в”Ӯ Source commit:  <+pipeline.variables.commitSha>"
                          echo "  в”Ӯ CI status:      вң” Build  вң” Lint  вң” Test"
                          echo "  в”Ӯ CI run:         https://github.com/pdutta25/bikeshop-db/actions"
                          echo "  в”Ӯ Approval req:   $(fmt $T_DB_APPROVE)"
                          echo "  в”Ӯ Approval grant: $(fmt $T_DB_APPROVED) (auto вҖ” timeout)"
                          echo "  в”Ӯ Approver:       System (auto-approve)"
                          echo "  в”Ӯ Deploy started: $(fmt $T_DB_START)"
                          echo "  в”Ӯ Deploy ended:   $(fmt $T_DB_END)"
                          echo "  в”Ӯ Deploy duration:$((T_DB_END - T_DB_START))s"
                          echo "  в”Ӯ Deploy result:  вң” SUCCESS"
