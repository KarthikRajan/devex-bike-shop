pipeline:
  name: gated-release-devex-bike-shop
  identifier: gatedreleasedevexbikeshop
  projectIdentifier: devexbikeshop
  orgIdentifier: default
  tags: {}
  variables:
    - name: commitSha
      type: String
      default: "unknown"
      value: <+input>
    - name: buildNumber
      type: String
      default: "0"
      value: <+input>
    - name: branch
      type: String
      default: "main"
      value: <+input>
    - name: prNumber
      type: String
      default: "none"
      value: <+input>
    - name: triggeredBy
      type: String
      default: "GitHub Actions"
      value: <+input>
    - name: repoUrl
      type: String
      default: "https://github.com/devx-bike-shop"
      value: <+input>
    - name: runId
      type: String
      default: "0"
      value: <+input>
    - name: dbVer
      type: String
      default: "unknown"
      value: <+input>
    - name: dbChange
      type: String
      default: "unknown"
      value: <+input>
    - name: svcVer
      type: String
      default: "unknown"
      value: <+input>
    - name: svcChange
      type: String
      default: "unknown"
      value: <+input>
    - name: uiVer
      type: String
      default: "unknown"
      value: <+input>
    - name: uiChange
      type: String
      default: "unknown"
      value: <+input>
  stages:
    # ════════════════════════════════════════════════════════════
    # DEV — Deploy and Certify (Auto-Approved)
    # ════════════════════════════════════════════════════════════
    - stage:
        name: DEV
        identifier: DEV
        type: Custom
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
        spec:
          execution:
            steps:
              # ── Gate: Approve Database Deploy ──
              - step:
                  name: Approve Database Deploy
                  identifier: Approve_Database_Deploy
                  type: HarnessApproval
                  timeout: 10s
                  spec:
                    approvalMessage: |-
                      🗄️ Approving Database component for deployment to DEV
                      Database v<+pipeline.variables.dbVer> — <+pipeline.variables.dbChange>
                      CI: ✔ Build ✔ Lint ✔ Test — https://github.com/pdutta25/bikeshop-db/actions
                      Build: #<+pipeline.variables.buildNumber>
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Timeout
                        action:
                          type: MarkAsSuccess

              # ── Deploy Database ──
              - step:
                  name: Deploy Database
                  identifier: Deploy_Database
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "╔══════════════════════════════════════╗"
                          echo "║  DEPLOY — DATABASE                   ║"
                          echo "╚══════════════════════════════════════╝"
                          echo ""
                          echo "🗄️  Deploying database to DEV"
                          echo "   Build: #<+pipeline.variables.buildNumber> | Commit: <+pipeline.variables.commitSha>"
                          echo ""
                          echo "📋 Component: Database v<+pipeline.variables.dbVer>"
                          echo "   Change:   <+pipeline.variables.dbChange>"
                          echo ""
                          echo "🔗 CI Run: https://github.com/pdutta25/bikeshop-db/actions"
                          echo "   ✔ Build   — Schema compiled"
                          echo "   ✔ Lint    — SQL syntax validated"
                          echo "   ✔ Test    — Migration tests passed"
                          echo ""
                          sleep 2
                          echo "   Running schema diff... ✔"
                          sleep 2
                          echo "   Applying migrations..."
                          echo "     ✔ 001_create_products_table"
                          echo "     ✔ 002_create_categories_table"
                          echo "     ✔ 003_create_orders_table"
                          echo "     ✔ 004_create_customers_table"
                          sleep 2
                          echo "   Verifying integrity... ✔"
                          echo "   Seeding reference data... ✔"
                          echo ""
                          echo "✅ Database deployed to DEV"

              # ── Services & UI: each with own gate, running in parallel ──
              - parallel:
                  - stepGroup:
                      name: Services Track
                      identifier: Services_Track
                      steps:
                        - step:
                            name: Approve Services Deploy
                            identifier: Approve_Services_Deploy
                            type: HarnessApproval
                            timeout: 10s
                            spec:
                              approvalMessage: |-
                                ⚙️ Approving Services component for deployment to DEV
                                Services v<+pipeline.variables.svcVer> — <+pipeline.variables.svcChange>
                                CI: ✔ Build ✔ Lint ✔ Test — https://github.com/pdutta25/bikeshop-services/actions
                                Build: #<+pipeline.variables.buildNumber>
                              includePipelineExecutionHistory: true
                              approvers:
                                userGroups:
                                  - _project_all_users
                                minimumCount: 1
                                disallowPipelineExecutor: false
                              isAutoRejectEnabled: false
                            failureStrategies:
                              - onFailure:
                                  errors:
                                    - Timeout
                                  action:
                                    type: MarkAsSuccess
                        - step:
                            name: Deploy Services
                            identifier: Deploy_Services
                            type: ShellScript
                            timeout: 5m
                            spec:
                              shell: Bash
                              onDelegate: true
                              source:
                                type: Inline
                                spec:
                                  script: |-
                                    #!/bin/bash
                                    echo "╔══════════════════════════════════════╗"
                                    echo "║  DEPLOY — SERVICES (API)  [parallel] ║"
                                    echo "╚══════════════════════════════════════╝"
                                    echo ""
                                    echo "⚙️  Deploying API services to DEV"
                                    echo "   Build: #<+pipeline.variables.buildNumber> | Commit: <+pipeline.variables.commitSha>"
                                    echo ""
                                    echo "📋 Component: Services v<+pipeline.variables.svcVer>"
                                    echo "   Change:   <+pipeline.variables.svcChange>"
                                    echo ""
                                    echo "🔗 CI Run: https://github.com/pdutta25/bikeshop-services/actions"
                                    echo "   ✔ Build   — API routes compiled"
                                    echo "   ✔ Lint    — ESLint + type check passed"
                                    echo "   ✔ Test    — API tests passed (4/4)"
                                    echo ""
                                    sleep 2
                                    echo "   Deploying Next.js API routes..."
                                    echo "     ✔ /api/products"
                                    echo "     ✔ /api/categories"
                                    echo "     ✔ /api/orders"
                                    echo "     ✔ /api/cart"
                                    echo "     ✔ /api/health"
                                    sleep 2
                                    echo "   Health check... HTTP 200 ✔"
                                    echo ""
                                    echo "✅ Services deployed to DEV"
                  - stepGroup:
                      name: UI Track
                      identifier: UI_Track
                      steps:
                        - step:
                            name: Approve UI Deploy
                            identifier: Approve_UI_Deploy
                            type: HarnessApproval
                            timeout: 10s
                            spec:
                              approvalMessage: |-
                                🎨 Approving UI component for deployment to DEV
                                UI v<+pipeline.variables.uiVer> — <+pipeline.variables.uiChange>
                                CI: ✔ Build ✔ Lint ✔ Test — https://github.com/pdutta25/bikeshop-ui/actions
                                Build: #<+pipeline.variables.buildNumber>
                              includePipelineExecutionHistory: true
                              approvers:
                                userGroups:
                                  - _project_all_users
                                minimumCount: 1
                                disallowPipelineExecutor: false
                              isAutoRejectEnabled: false
                            failureStrategies:
                              - onFailure:
                                  errors:
                                    - Timeout
                                  action:
                                    type: MarkAsSuccess
                        - step:
                            name: Deploy UI
                            identifier: Deploy_UI
                            type: ShellScript
                            timeout: 5m
                            spec:
                              shell: Bash
                              onDelegate: true
                              source:
                                type: Inline
                                spec:
                                  script: |-
                                    #!/bin/bash
                                    echo "╔══════════════════════════════════════╗"
                                    echo "║  DEPLOY — UI (Storefront) [parallel] ║"
                                    echo "╚══════════════════════════════════════╝"
                                    echo ""
                                    echo "🎨 Deploying storefront UI to DEV"
                                    echo "   Build: #<+pipeline.variables.buildNumber> | Commit: <+pipeline.variables.commitSha>"
                                    echo ""
                                    echo "📋 Component: UI v<+pipeline.variables.uiVer>"
                                    echo "   Change:   <+pipeline.variables.uiChange>"
                                    echo ""
                                    echo "🔗 CI Run: https://github.com/pdutta25/bikeshop-ui/actions"
                                    echo "   ✔ Build   — Next.js compiled"
                                    echo "   ✔ Lint    — ESLint + Prettier passed"
                                    echo "   ✔ Test    — UI tests passed (4/4)"
                                    echo ""
                                    sleep 2
                                    echo "   Deploying static assets... ✔"
                                    sleep 2
                                    echo "   Deploying SSR pages..."
                                    echo "     ✔ Homepage"
                                    echo "     ✔ Product catalog"
                                    echo "     ✔ Product detail"
                                    echo "     ✔ Cart & Checkout"
                                    echo "     ✔ Admin dashboard"
                                    sleep 2
                                    echo "   CDN cache invalidation... ✔"
                                    echo "   Visual diff check... no regressions ✔"
                                    echo ""
                                    echo "✅ UI deployed to DEV"

              # ── DEV Smoke Tests ──
              - step:
                  name: DEV Smoke Tests
                  identifier: DEV_Smoke_Tests
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "🔍 DEV Smoke Tests"
                          echo ""
                          echo "   ✔ [DEV-01] Build artifact verified"
                          echo "   ✔ [DEV-02] Config validation passed"
                          echo "   ✔ [DEV-03] Service health simulated"
                          echo ""
                          echo "┌──────────────────────────────────────┐"
                          echo "│     DEV SMOKE TEST RESULTS           │"
                          echo "├──────────────────────────────────────┤"
                          echo "│ Total Tests:    3                    │"
                          echo "│ Passed:         3                    │"
                          echo "│ Failed:         0                    │"
                          echo "│ Status:         ✅ ALL PASSED        │"
                          echo "└──────────────────────────────────────┘"
                          echo ""
                          echo "✅ DEV smoke tests passed"

              # ── Certify DEV Build (Auto-Approve in 10s) ──
              - step:
                  name: Certify DEV Build
                  identifier: Certify_DEV_Build
                  type: HarnessApproval
                  timeout: 10s
                  spec:
                    approvalMessage: |-
                      ✅ Certifying all 3 components deployed successfully
                      Database v<+pipeline.variables.dbVer> | Services v<+pipeline.variables.svcVer> | UI v<+pipeline.variables.uiVer>
                      Build: #<+pipeline.variables.buildNumber>
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Timeout
                        action:
                          type: MarkAsSuccess

              # ── DEV Telemetry Report ──
              - step:
                  name: DEV Telemetry
                  identifier: DEV_Telemetry
                  type: ShellScript
                  timeout: 1m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                          EPOCH=$(date +%s)
                          T0=$((EPOCH - 87))
                          T_DB_APPROVE=$((T0 + 2))
                          T_DB_APPROVED=$((T0 + 12))
                          T_DB_START=$((T0 + 13))
                          T_DB_END=$((T0 + 25))
                          T_SVC_APPROVE=$((T0 + 26))
                          T_SVC_APPROVED=$((T0 + 36))
                          T_SVC_START=$((T0 + 37))
                          T_SVC_END=$((T0 + 49))
                          T_UI_APPROVE=$((T0 + 26))
                          T_UI_APPROVED=$((T0 + 36))
                          T_UI_START=$((T0 + 37))
                          T_UI_END=$((T0 + 55))
                          T_SMOKE_START=$((T0 + 56))
                          T_SMOKE_END=$((T0 + 62))
                          T_CERT=$((T0 + 72))
                          FMT="%Y-%m-%dT%H:%M:%SZ"
                          fmt() { date -u -d @$1 +"$FMT" 2>/dev/null || date -u -r $1 +"$FMT"; }
                          echo ""
                          echo "╔══════════════════════════════════════════════════════════════════╗"
                          echo "║               TELEMETRY — GATED RELEASE (DEV)                    ║"
                          echo "╚══════════════════════════════════════════════════════════════════╝"
                          echo ""
                          echo "── 1. Pipeline ───────────────────────────────────────────────────"
                          echo "  Pipeline:       gated-release-devex-bike-shop"
                          echo "  Identifier:     gatedreleasedevexbikeshop"
                          echo "  Execution ID:   <+pipeline.executionId>"
                          echo "  Pattern:        Gated (independent component approvals)"
                          echo "  Stage:          DEV"
                          echo "  Build:          #<+pipeline.variables.buildNumber>"
                          echo "  Commit:         <+pipeline.variables.commitSha>"
                          echo "  Branch:         <+pipeline.variables.branch>"
                          echo "  Triggered by:   <+pipeline.variables.triggeredBy>"
                          echo "  Trigger source: Repository dispatch (component-updated)"
                          echo "  Stage started:  $(fmt $T0)"
                          echo "  Stage ended:    $NOW"
                          echo "  Stage duration: ~$((EPOCH - T0))s"
                          echo "  Stage result:   PASSED"
                          echo ""
                          echo "── 2. Components ─────────────────────────────────────────────────"
                          echo ""
                          echo "  ┌─ Database ────────────────────────────────────────────────────"
                          echo "  │ Version:        v<+pipeline.variables.dbVer>"
                          echo "  │ Change:         <+pipeline.variables.dbChange>"
                          echo "  │ Source repo:    https://github.com/pdutta25/bikeshop-db"
                          echo "  │ Source commit:  <+pipeline.variables.commitSha>"
                          echo "  │ CI status:      ✔ Build  ✔ Lint  ✔ Test"
                          echo "  │ CI run:         https://github.com/pdutta25/bikeshop-db/actions"
                          echo "  │ Approval req:   $(fmt $T_DB_APPROVE)"
                          echo "  │ Approval grant: $(fmt $T_DB_APPROVED) (auto — timeout)"
                          echo "  │ Approver:       System (auto-approve)"
                          echo "  │ Deploy started: $(fmt $T_DB_START)"
                          echo "  │ Deploy ended:   $(fmt $T_DB_END)"
                          echo "  │ Deploy duration:$((T_DB_END - T_DB_START))s"
                          echo "  │ Deploy result:  ✔ SUCCESS"
                          echo "  └───────────────────────────────────────────────────────────────"
                          echo ""
                          echo "  ┌─ Services ────────────────────────────────────────────────────"
                          echo "  │ Version:        v<+pipeline.variables.svcVer>"
                          echo "  │ Change:         <+pipeline.variables.svcChange>"
                          echo "  │ Source repo:    https://github.com/pdutta25/bikeshop-services"
                          echo "  │ Source commit:  <+pipeline.variables.commitSha>"
                          echo "  │ CI status:      ✔ Build  ✔ Lint  ✔ Test"
                          echo "  │ CI run:         https://github.com/pdutta25/bikeshop-services/actions"
                          echo "  │ Approval req:   $(fmt $T_SVC_APPROVE)"
                          echo "  │ Approval grant: $(fmt $T_SVC_APPROVED) (auto — timeout)"
                          echo "  │ Approver:       System (auto-approve)"
                          echo "  │ Deploy started: $(fmt $T_SVC_START)"
                          echo "  │ Deploy ended:   $(fmt $T_SVC_END)"
                          echo "  │ Deploy duration:$((T_SVC_END - T_SVC_START))s"
                          echo "  │ Deploy result:  ✔ SUCCESS"
                          echo "  │ Parallel with:  UI"
                          echo "  └───────────────────────────────────────────────────────────────"
                          echo ""
                          echo "  ┌─ UI ──────────────────────────────────────────────────────────"
                          echo "  │ Version:        v<+pipeline.variables.uiVer>"
                          echo "  │ Change:         <+pipeline.variables.uiChange>"
                          echo "  │ Source repo:    https://github.com/pdutta25/bikeshop-ui"
                          echo "  │ Source commit:  <+pipeline.variables.commitSha>"
                          echo "  │ CI status:      ✔ Build  ✔ Lint  ✔ Test"
                          echo "  │ CI run:         https://github.com/pdutta25/bikeshop-ui/actions"
                          echo "  │ Approval req:   $(fmt $T_UI_APPROVE)"
                          echo "  │ Approval grant: $(fmt $T_UI_APPROVED) (auto — timeout)"
                          echo "  │ Approver:       System (auto-approve)"
                          echo "  │ Deploy started: $(fmt $T_UI_START)"
                          echo "  │ Deploy ended:   $(fmt $T_UI_END)"
                          echo "  │ Deploy duration:$((T_UI_END - T_UI_START))s"
                          echo "  │ Deploy result:  ✔ SUCCESS"
                          echo "  │ Parallel with:  Services"
                          echo "  └───────────────────────────────────────────────────────────────"
                          echo ""
                          echo "── 3. Verification ───────────────────────────────────────────────"
                          echo "  Smoke test started:  $(fmt $T_SMOKE_START)"
                          echo "  Smoke test ended:    $(fmt $T_SMOKE_END)"
                          echo "  Smoke test duration: $((T_SMOKE_END - T_SMOKE_START))s"
                          echo "  Tests run:           3"
                          echo "  Tests passed:        3"
                          echo "  Tests failed:        0"
                          echo "  Health check:        ✔ HTTP 200 (simulated)"
                          echo "  Response time:       142ms (simulated)"
                          echo "  Smoke result:        ✔ PASSED"
                          echo ""
                          echo "── 4. Certification ──────────────────────────────────────────────"
                          echo "  Certified at:        $(fmt $T_CERT)"
                          echo "  Certified by:        System (auto-approve)"
                          echo "  Certification:       ✔ DEV CERTIFIED"
                          echo ""
                          echo "── 5. Traceability ───────────────────────────────────────────────"
                          echo "  Commit URL:          <+pipeline.variables.repoUrl>/commit/<+pipeline.variables.commitSha>"
                          echo "  CI workflow run:     <+pipeline.variables.repoUrl>/actions/runs/<+pipeline.variables.runId>"
                          echo "  Harness execution:   <+pipeline.executionId>"
                          echo "  DB CI:               https://github.com/pdutta25/bikeshop-db/actions"
                          echo "  Svc CI:              https://github.com/pdutta25/bikeshop-services/actions"
                          echo "  UI CI:               https://github.com/pdutta25/bikeshop-ui/actions"
                          echo "  Release notes:       N/A (DEV stage)"
                          echo ""
                          echo "── 6. Result ─────────────────────────────────────────────────────"
                          echo "  ✅ DEV STAGE PASSED"
                          echo "  All 3 components deployed, verified, and certified."
                          echo "  Total stage duration: ~$((EPOCH - T0))s"
                          echo ""
        tags: {}
