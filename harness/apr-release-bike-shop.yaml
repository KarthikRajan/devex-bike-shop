                      Auth v<+pipeline.variables.authVer> | Payments v<+pipeline.variables.payVer> | Inventory v<+pipeline.variables.invVer>
                      Notifications v<+pipeline.variables.notifVer> | Analytics v<+pipeline.variables.anlytVer>
                      Storefront v<+pipeline.variables.sfVer> | Admin v<+pipeline.variables.adminVer> | Mobile API v<+pipeline.variables.mobileVer>
                      CDN v<+pipeline.variables.cdnVer> | Docs v<+pipeline.variables.docsVer>
