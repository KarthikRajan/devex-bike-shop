                            timeout: 1m
                            spec:
                              shell: Bash
                              onDelegate: true
                              source:
                                type: Inline
                                spec:
                                  script: |-
                                    #!/bin/bash
                                    echo "⏸️  Reserved backend slot — no component assigned"
                        - step:
                            name: Reserved Backend Slot 2
                            identifier: PROD_Reserved_Backend_Slot_2
                            type: ShellScript
                            timeout: 1m
                            spec:
                              shell: Bash
                              onDelegate: true
                              source:
                                type: Inline
                                spec:
                                  script: |-
                                    #!/bin/bash
                                    echo "⏸️  Reserved backend slot — no component assigned"
                  - stepGroup:
                      name: Frontend Group
                      identifier: PROD_Frontend_Group
                      steps:
                        - step:
                            name: Deploy Storefront App
                            identifier: PROD_Deploy_Storefront_App
