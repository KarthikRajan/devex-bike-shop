                                type: Inline
                                spec:
                                  script: |-
                                    #!/bin/bash
                                    echo "╔══════════════════════════════════════╗"
                                    echo "║  DEPLOY — MOBILE API                 ║"
                                    echo "╚══════════════════════════════════════╝"
