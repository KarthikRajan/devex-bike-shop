                          echo "  Storefront v<+pipeline.variables.sfVer> | Admin v<+pipeline.variables.adminVer> | Mobile API v<+pipeline.variables.mobileVer>"
                          echo "  CDN v<+pipeline.variables.cdnVer> | Docs v<+pipeline.variables.docsVer>"
                          echo ""
                          
                          # ── Pipeline Annotation ──
                          cat >> /tmp/pipeline_annotations.md << 'ANNOT_DONE'
                          ## ✅ Release Complete
                          
                          All 10 components deployed across DEV → SIT → PROD
                          
                          | Component | Version |
                          |-----------|---------|
                          | Auth | v<+pipeline.variables.authVer> |
                          | Payments | v<+pipeline.variables.payVer> |
                          | Inventory | v<+pipeline.variables.invVer> |
                          | Notifications | v<+pipeline.variables.notifVer> |
                          | Analytics | v<+pipeline.variables.anlytVer> |
                          | Storefront | v<+pipeline.variables.sfVer> |
                          | Admin | v<+pipeline.variables.adminVer> |
                          | Mobile API | v<+pipeline.variables.mobileVer> |
                          | CDN | v<+pipeline.variables.cdnVer> |
                          | Docs | v<+pipeline.variables.docsVer> |
                          ANNOT_DONE
                          echo "" >> /tmp/pipeline_annotations.md
                          # ── Post all annotations to Harness execution notes ──
                          NOTES_PAYLOAD=$(jq -Rs '.' < /tmp/pipeline_annotations.md)
                          curl -sf -X PUT \
                            "https://app.harness.io/pipeline/api/pipelines/execution/<+pipeline.executionId>/notes?accountIdentifier=<+account.identifier>&orgIdentifier=<+org.identifier>&projectIdentifier=<+project.identifier>" \
                            -H "x-api-key: $HARNESS_API_KEY" \
                            -H "Content-Type: application/json" \
                            -d "$NOTES_PAYLOAD" \
                            && echo "  ✅ Annotations posted to execution notes" \
                            || echo "  ⚠️  Could not post annotations (check harness_api_key secret)"
                          
        tags: {}
