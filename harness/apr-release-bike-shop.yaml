pipeline:
  name: apr-release-bike-shop
  identifier: aprreleasebikeshop
  projectIdentifier: devexbikeshop
  orgIdentifier: default
  tags: {}
  variables:
    - name: commitSha
      type: String
      default: "unknown"
      value: <+input>
    - name: buildNumber
      type: String
      default: "unknown"
      value: <+input>
    - name: branch
      type: String
      default: "unknown"
      value: <+input>
    - name: prNumber
      type: String
      default: "unknown"
      value: <+input>
    - name: triggeredBy
      type: String
      default: "unknown"
      value: <+input>
    - name: repoUrl
      type: String
      default: "unknown"
      value: <+input>
    - name: runId
      type: String
      default: "unknown"
      value: <+input>
    - name: triggerRepo
      type: String
      default: "unknown"
      value: <+input>
    - name: authVer
      type: String
      default: "unknown"
      value: <+input>
    - name: authChange
      type: String
      default: "unknown"
      value: <+input>
    - name: payVer
      type: String
      default: "unknown"
      value: <+input>
    - name: payChange
      type: String
      default: "unknown"
      value: <+input>
    - name: invVer
      type: String
      default: "unknown"
      value: <+input>
    - name: invChange
      type: String
      default: "unknown"
      value: <+input>
    - name: notifVer
      type: String
      default: "unknown"
      value: <+input>
    - name: notifChange
      type: String
      default: "unknown"
      value: <+input>
    - name: anlytVer
      type: String
      default: "unknown"
      value: <+input>
    - name: anlytChange
      type: String
      default: "unknown"
      value: <+input>
    - name: sfVer
      type: String
      default: "unknown"
      value: <+input>
    - name: sfChange
      type: String
      default: "unknown"
      value: <+input>
    - name: adminVer
      type: String
      default: "unknown"
      value: <+input>
    - name: adminChange
      type: String
      default: "unknown"
      value: <+input>
    - name: mobileVer
      type: String
      default: "unknown"
      value: <+input>
    - name: mobileChange
      type: String
      default: "unknown"
      value: <+input>
    - name: cdnVer
      type: String
      default: "unknown"
      value: <+input>
    - name: cdnChange
      type: String
      default: "unknown"
      value: <+input>
    - name: docsVer
      type: String
      default: "unknown"
      value: <+input>
    - name: docsChange
      type: String
      default: "unknown"
      value: <+input>
  stages:
    # ════════════════════════════════════════════════════════════
    # Start — Pipeline Overview
    # ════════════════════════════════════════════════════════════
    - stage:
        name: Start
        identifier: Start
        type: Custom
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
        spec:
          execution:
            steps:
              # ── Whats Releasing ──
              - step:
                  name: Whats Releasing
                  identifier: Whats_Shipping
                  type: ShellScript
                  timeout: 1m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo ""
                          echo "╔══════════════════════════════════════════════════════════════════╗"
                          echo "║                      WHATS RELEASING                                ║"
                          echo "║  Pipeline identity, release pattern, and trigger details.         ║"
                          echo "╚══════════════════════════════════════════════════════════════════╝"
                          echo ""
                          echo "── Pipeline ──────────────────────────────────────────────────────"
                          echo "  Name:           apr-release-bike-shop"
                          echo "  Pattern:        Unified Release (single approval gate)"
                          echo "  Strategy:       One approval, all 10 components flow —"
                          echo "                  ship fast when everything's green."
                          echo "  Target:         DEV"
                          echo "  Build:          #<+pipeline.variables.buildNumber>"
                          echo "  Commit:         <+pipeline.variables.commitSha>"
                          echo "  Branch:         <+pipeline.variables.branch>"
                          echo "  Triggered by:   <+pipeline.variables.triggeredBy>"
                          echo "  Trigger repo:   https://github.com/<+pipeline.variables.triggerRepo>"
                          echo ""
              # ── Whats Inside ──
              - step:
                  name: Whats Inside
                  identifier: Whats_Inside
                  type: ShellScript
                  timeout: 1m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo ""
                          echo "╔══════════════════════════════════════════════════════════════════╗"
                          echo "║                      WHATS INSIDE                             ║"
                          echo "║  All components included in this release with versions.           ║"
                          echo "╚══════════════════════════════════════════════════════════════════╝"
                          echo ""
                          echo "── Components in this Release ────────────────────────────────────"
                          echo "  🔐 Auth Service         → bikeshop-auth           v<+pipeline.variables.authVer>"
                          echo "                            <+pipeline.variables.authChange>"
                          echo "  💳 Payment Service      → bikeshop-payments       v<+pipeline.variables.payVer>"
                          echo "                            <+pipeline.variables.payChange>"
                          echo "  📦 Inventory Service    → bikeshop-inventory      v<+pipeline.variables.invVer>"
                          echo "                            <+pipeline.variables.invChange>"
                          echo "  🔔 Notification Service → bikeshop-notifications  v<+pipeline.variables.notifVer>"
                          echo "                            <+pipeline.variables.notifChange>"
                          echo "  📊 Analytics Service    → bikeshop-analytics      v<+pipeline.variables.anlytVer>"
                          echo "                            <+pipeline.variables.anlytChange>"
                          echo "  🛍️  Storefront App      → bikeshop-storefront     v<+pipeline.variables.sfVer>"
                          echo "                            <+pipeline.variables.sfChange>"
                          echo "  🛠️  Admin Dashboard     → bikeshop-admin          v<+pipeline.variables.adminVer>"
                          echo "                            <+pipeline.variables.adminChange>"
                          echo "  📱 Mobile API           → bikeshop-mobile-api     v<+pipeline.variables.mobileVer>"
                          echo "                            <+pipeline.variables.mobileChange>"
                          echo "  🌐 CDN Assets           → bikeshop-cdn            v<+pipeline.variables.cdnVer>"
                          echo "                            <+pipeline.variables.cdnChange>"
                          echo "  📚 Docs Portal          → bikeshop-docs           v<+pipeline.variables.docsVer>"
                          echo "                            <+pipeline.variables.docsChange>"
                          echo ""
              # ── How Its Releasing ──
              - step:
                  name: How Its Releasing
                  identifier: How_It_Ships
                  type: ShellScript
                  timeout: 1m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo ""
                          echo "╔══════════════════════════════════════════════════════════════════╗"
                          echo "║                      HOW ITS RELEASING                              ║"
                          echo "║  Release flow diagram and source repositories.                    ║"
                          echo "╚══════════════════════════════════════════════════════════════════╝"
                          echo ""
                          echo "── Release Flow ──────────────────────────────────────────────────"
                          echo ""
                          echo "  Approve Deploys → Deploy Auth → Deploy Payments (sequential)"
                          echo "        ↓"
                          echo "  ┌─── Backend Group (5 parallel) ───┐  ┌─── Frontend Group (5 parallel) ──┐"
                          echo "  │ Deploy Inventory                 │  │ Deploy Storefront                │"
                          echo "  │ Deploy Notifications             │  │ Deploy Admin                     │"
                          echo "  │ Deploy Analytics                 │  │ Deploy Mobile API                │"
                          echo "  │ (reserved)                       │  │ Deploy CDN                       │"
                          echo "  │ (reserved)                       │  │ Deploy Docs                      │"
                          echo "  └──────────────────────────────────┘  └──────────────────────────────────┘"
                          echo "        ↓"
                          echo "  Smoke Tests → Certify → DEV Recap"
                          echo ""
                          echo "── Source Repos ──────────────────────────────────────────────────"
                          echo "  https://github.com/pdutta25/bikeshop-auth"
                          echo "  https://github.com/pdutta25/bikeshop-payments"
                          echo "  https://github.com/pdutta25/bikeshop-inventory"
                          echo "  https://github.com/pdutta25/bikeshop-notifications"
                          echo "  https://github.com/pdutta25/bikeshop-analytics"
                          echo "  https://github.com/pdutta25/bikeshop-storefront"
                          echo "  https://github.com/pdutta25/bikeshop-admin"
                          echo "  https://github.com/pdutta25/bikeshop-mobile-api"
                          echo "  https://github.com/pdutta25/bikeshop-cdn"
                          echo "  https://github.com/pdutta25/bikeshop-docs"
                          echo ""
                          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                          echo "  Proceeding to approval and deployments..."
                          echo ""
        tags: {}

    # ════════════════════════════════════════════════════════════
    # DEV — Single gate, Auth+Pay sequential, then 5+5 parallel
    # ════════════════════════════════════════════════════════════
    - stage:
        name: DEV
        identifier: DEV
        type: Custom
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
        spec:
          execution:
            steps:
              # ── Gate: Approve Deploys ──
              - step:
                  name: Approve Deploys
                  identifier: Approve_Deploys
                  type: HarnessApproval
                  timeout: 10s
                  spec:
                    approvalMessage: |-
                      Approving all 10 components for deployment to DEV
                      Auth v<+pipeline.variables.authVer> | Payments v<+pipeline.variables.payVer> | Inventory v<+pipeline.variables.invVer>
                      Notifications v<+pipeline.variables.notifVer> | Analytics v<+pipeline.variables.anlytVer>
                      Storefront v<+pipeline.variables.sfVer> | Admin v<+pipeline.variables.adminVer> | Mobile API v<+pipeline.variables.mobileVer>
                      CDN v<+pipeline.variables.cdnVer> | Docs v<+pipeline.variables.docsVer>
                      CI: Build Lint Test — all 10 repos passed
                      Build: #<+pipeline.variables.buildNumber>
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Timeout
                        action:
                          type: MarkAsSuccess

              # ── Deploy Auth Service (sequential) ──
              - step:
                  name: Deploy Auth Service
                  identifier: Deploy_Auth_Service
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "╔══════════════════════════════════════╗"
                          echo "║  DEPLOY — AUTH SERVICE               ║"
                          echo "╚══════════════════════════════════════╝"
                          echo ""
                          echo "📋 Component: Auth Service v<+pipeline.variables.authVer>"
                          echo "   Change:   <+pipeline.variables.authChange>"
                          echo "   CI:       ✔ Build ✔ Lint ✔ Test"
                          echo "   Source:   https://github.com/pdutta25/bikeshop-auth"
                          echo ""
                          echo "✅ Auth Service deployed to DEV"

              # ── Deploy Payment Service (sequential after Auth) ──
              - step:
                  name: Deploy Payment Service
                  identifier: Deploy_Payment_Service
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "╔══════════════════════════════════════╗"
                          echo "║  DEPLOY — PAYMENT SERVICE            ║"
                          echo "╚══════════════════════════════════════╝"
                          echo ""
                          echo "📋 Component: Payment Service v<+pipeline.variables.payVer>"
                          echo "   Change:   <+pipeline.variables.payChange>"
                          echo "   CI:       ✔ Build ✔ Lint ✔ Test"
                          echo "   Source:   https://github.com/pdutta25/bikeshop-payments"
                          echo ""
                          echo "✅ Payment Service deployed to DEV"

              # ── Backend + Frontend Groups (parallel stepGroups) ──
              - parallel:
                  - stepGroup:
                      name: Backend Group
                      identifier: Backend_Group
                      steps:
                        - step:
                            name: Deploy Inventory Service
                            identifier: Deploy_Inventory_Service
                            type: ShellScript
                            timeout: 5m
                            spec:
                              shell: Bash
                              onDelegate: true
                              source:
                                type: Inline
                                spec:
                                  script: |-
                                    #!/bin/bash
                                    echo "╔══════════════════════════════════════╗"
                                    echo "║  DEPLOY — INVENTORY SERVICE          ║"
                                    echo "╚══════════════════════════════════════╝"
                                    echo ""
                                    echo "📋 Component: Inventory Service v<+pipeline.variables.invVer>"
                                    echo "   Change:   <+pipeline.variables.invChange>"
                                    echo "   CI:       ✔ Build ✔ Lint ✔ Test"
                                    echo "   Source:   https://github.com/pdutta25/bikeshop-inventory"
                                    echo ""
                                    echo "✅ Inventory Service deployed to DEV"
                        - step:
                            name: Deploy Notification Service
                            identifier: Deploy_Notification_Service
                            type: ShellScript
                            timeout: 5m
                            spec:
                              shell: Bash
                              onDelegate: true
                              source:
                                type: Inline
                                spec:
                                  script: |-
                                    #!/bin/bash
                                    echo "╔══════════════════════════════════════╗"
                                    echo "║  DEPLOY — NOTIFICATION SERVICE       ║"
                                    echo "╚══════════════════════════════════════╝"
                                    echo ""
                                    echo "📋 Component: Notification Service v<+pipeline.variables.notifVer>"
                                    echo "   Change:   <+pipeline.variables.notifChange>"
                                    echo "   CI:       ✔ Build ✔ Lint ✔ Test"
                                    echo "   Source:   https://github.com/pdutta25/bikeshop-notifications"
                                    echo ""
                                    echo "✅ Notification Service deployed to DEV"
                        - step:
                            name: Deploy Analytics Service
                            identifier: Deploy_Analytics_Service
                            type: ShellScript
                            timeout: 5m
                            spec:
                              shell: Bash
                              onDelegate: true
                              source:
                                type: Inline
                                spec:
                                  script: |-
                                    #!/bin/bash
                                    echo "╔══════════════════════════════════════╗"
                                    echo "║  DEPLOY — ANALYTICS SERVICE          ║"
                                    echo "╚══════════════════════════════════════╝"
                                    echo ""
                                    echo "📋 Component: Analytics Service v<+pipeline.variables.anlytVer>"
                                    echo "   Change:   <+pipeline.variables.anlytChange>"
                                    echo "   CI:       ✔ Build ✔ Lint ✔ Test"
                                    echo "   Source:   https://github.com/pdutta25/bikeshop-analytics"
                                    echo ""
                                    echo "✅ Analytics Service deployed to DEV"
                        - step:
                            name: Reserved Backend Slot 1
                            identifier: Reserved_Backend_Slot_1
                            type: ShellScript
                            timeout: 1m
                            spec:
                              shell: Bash
                              onDelegate: true
                              source:
                                type: Inline
                                spec:
                                  script: |-
                                    #!/bin/bash
                                    echo "⏸️  Reserved backend slot — no component assigned"
                        - step:
                            name: Reserved Backend Slot 2
                            identifier: Reserved_Backend_Slot_2
                            type: ShellScript
                            timeout: 1m
                            spec:
                              shell: Bash
                              onDelegate: true
                              source:
                                type: Inline
                                spec:
                                  script: |-
                                    #!/bin/bash
                                    echo "⏸️  Reserved backend slot — no component assigned"
                  - stepGroup:
                      name: Frontend Group
                      identifier: Frontend_Group
                      steps:
                        - step:
                            name: Deploy Storefront App
                            identifier: Deploy_Storefront_App
                            type: ShellScript
                            timeout: 5m
                            spec:
                              shell: Bash
                              onDelegate: true
                              source:
                                type: Inline
                                spec:
                                  script: |-
                                    #!/bin/bash
                                    echo "╔══════════════════════════════════════╗"
                                    echo "║  DEPLOY — STOREFRONT APP             ║"
                                    echo "╚══════════════════════════════════════╝"
                                    echo ""
                                    echo "📋 Component: Storefront App v<+pipeline.variables.sfVer>"
                                    echo "   Change:   <+pipeline.variables.sfChange>"
                                    echo "   CI:       ✔ Build ✔ Lint ✔ Test"
                                    echo "   Source:   https://github.com/pdutta25/bikeshop-storefront"
                                    echo ""
                                    echo "✅ Storefront App deployed to DEV"
                        - step:
                            name: Deploy Admin Dashboard
                            identifier: Deploy_Admin_Dashboard
                            type: ShellScript
                            timeout: 5m
                            spec:
                              shell: Bash
                              onDelegate: true
                              source:
                                type: Inline
                                spec:
                                  script: |-
                                    #!/bin/bash
                                    echo "╔══════════════════════════════════════╗"
                                    echo "║  DEPLOY — ADMIN DASHBOARD            ║"
                                    echo "╚══════════════════════════════════════╝"
                                    echo ""
                                    echo "📋 Component: Admin Dashboard v<+pipeline.variables.adminVer>"
                                    echo "   Change:   <+pipeline.variables.adminChange>"
                                    echo "   CI:       ✔ Build ✔ Lint ✔ Test"
                                    echo "   Source:   https://github.com/pdutta25/bikeshop-admin"
                                    echo ""
                                    echo "✅ Admin Dashboard deployed to DEV"
                        - step:
                            name: Deploy Mobile API
                            identifier: Deploy_Mobile_API
                            type: ShellScript
                            timeout: 5m
                            spec:
                              shell: Bash
                              onDelegate: true
                              source:
                                type: Inline
                                spec:
                                  script: |-
                                    #!/bin/bash
                                    echo "╔══════════════════════════════════════╗"
                                    echo "║  DEPLOY — MOBILE API                 ║"
                                    echo "╚══════════════════════════════════════╝"
                                    echo ""
                                    echo "📋 Component: Mobile API v<+pipeline.variables.mobileVer>"
                                    echo "   Change:   <+pipeline.variables.mobileChange>"
                                    echo "   CI:       ✔ Build ✔ Lint ✔ Test"
                                    echo "   Source:   https://github.com/pdutta25/bikeshop-mobile-api"
                                    echo ""
                                    echo "✅ Mobile API deployed to DEV"
                        - step:
                            name: Deploy CDN Assets
                            identifier: Deploy_CDN_Assets
                            type: ShellScript
                            timeout: 5m
                            spec:
                              shell: Bash
                              onDelegate: true
                              source:
                                type: Inline
                                spec:
                                  script: |-
                                    #!/bin/bash
                                    echo "╔══════════════════════════════════════╗"
                                    echo "║  DEPLOY — CDN ASSETS                 ║"
                                    echo "╚══════════════════════════════════════╝"
                                    echo ""
                                    echo "📋 Component: CDN Assets v<+pipeline.variables.cdnVer>"
                                    echo "   Change:   <+pipeline.variables.cdnChange>"
                                    echo "   CI:       ✔ Build ✔ Lint ✔ Test"
                                    echo "   Source:   https://github.com/pdutta25/bikeshop-cdn"
                                    echo ""
                                    echo "✅ CDN Assets deployed to DEV"
                        - step:
                            name: Deploy Docs Portal
                            identifier: Deploy_Docs_Portal
                            type: ShellScript
                            timeout: 5m
                            spec:
                              shell: Bash
                              onDelegate: true
                              source:
                                type: Inline
                                spec:
                                  script: |-
                                    #!/bin/bash
                                    echo "╔══════════════════════════════════════╗"
                                    echo "║  DEPLOY — DOCS PORTAL                ║"
                                    echo "╚══════════════════════════════════════╝"
                                    echo ""
                                    echo "📋 Component: Docs Portal v<+pipeline.variables.docsVer>"
                                    echo "   Change:   <+pipeline.variables.docsChange>"
                                    echo "   CI:       ✔ Build ✔ Lint ✔ Test"
                                    echo "   Source:   https://github.com/pdutta25/bikeshop-docs"
                                    echo ""
                                    echo "✅ Docs Portal deployed to DEV"

              # ── DEV Smoke Tests ──
              - step:
                  name: DEV Smoke Tests
                  identifier: DEV_Smoke_Tests
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "🔍 DEV Smoke Tests"
                          echo ""
                          echo "   ✔ [DEV-01] Auth Service health check passed"
                          echo "   ✔ [DEV-02] Payment Service health check passed"
                          echo "   ✔ [DEV-03] Inventory Service health check passed"
                          echo "   ✔ [DEV-04] Notification Service health check passed"
                          echo "   ✔ [DEV-05] Analytics Service health check passed"
                          echo "   ✔ [DEV-06] Storefront App reachable"
                          echo "   ✔ [DEV-07] Admin Dashboard reachable"
                          echo "   ✔ [DEV-08] Mobile API health check passed"
                          echo "   ✔ [DEV-09] CDN Assets accessible"
                          echo "   ✔ [DEV-10] Docs Portal reachable"
                          echo ""
                          echo "┌──────────────────────────────────────┐"
                          echo "│     DEV SMOKE TEST RESULTS           │"
                          echo "├──────────────────────────────────────┤"
                          echo "│ Total Tests:    10                   │"
                          echo "│ Passed:         10                   │"
                          echo "│ Failed:         0                    │"
                          echo "│ Status:         ✅ ALL PASSED        │"
                          echo "└──────────────────────────────────────┘"
                          echo ""
                          echo "✅ DEV smoke tests passed"

              # ── Certify DEV Build (Auto-Approve in 10s) ──
              - step:
                  name: Certify DEV Build
                  identifier: Certify_DEV_Build
                  type: HarnessApproval
                  timeout: 10s
                  spec:
                    approvalMessage: |-
                      Certifying all 10 components deployed successfully to DEV
                      Auth v<+pipeline.variables.authVer> | Payments v<+pipeline.variables.payVer> | Inventory v<+pipeline.variables.invVer>
                      Notifications v<+pipeline.variables.notifVer> | Analytics v<+pipeline.variables.anlytVer>
                      Storefront v<+pipeline.variables.sfVer> | Admin v<+pipeline.variables.adminVer> | Mobile API v<+pipeline.variables.mobileVer>
                      CDN v<+pipeline.variables.cdnVer> | Docs v<+pipeline.variables.docsVer>
                      Build: #<+pipeline.variables.buildNumber>
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Timeout
                        action:
                          type: MarkAsSuccess

              # ── DEV Recap ──
              - step:
                  name: DEV Recap
                  identifier: DEV_Recap
                  type: ShellScript
                  timeout: 1m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo ""
                          echo "╔══════════════════════════════════════════════════════════════════╗"
                          echo "║                        DEV RECAP                                ║"
                          echo "║  Summary of what was deployed and verified in DEV.                ║"
                          echo "╚══════════════════════════════════════════════════════════════════╝"
                          echo ""
                          echo "── Components Deployed ─────────────────────────────────────────────"
                          echo "  ✅ Auth Service         v<+pipeline.variables.authVer>  — <+pipeline.variables.authChange>"
                          echo "  ✅ Payment Service      v<+pipeline.variables.payVer>  — <+pipeline.variables.payChange>"
                          echo "  ✅ Inventory Service    v<+pipeline.variables.invVer>  — <+pipeline.variables.invChange>"
                          echo "  ✅ Notification Service v<+pipeline.variables.notifVer>  — <+pipeline.variables.notifChange>"
