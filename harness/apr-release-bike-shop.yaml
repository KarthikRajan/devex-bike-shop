        tags: {}

    # ════════════════════════════════════════════════════════════
    # PROD — Approval gate, Auth+Pay sequential, then 5+5 parallel
    # ════════════════════════════════════════════════════════════
    - stage:
        name: PROD
        identifier: PROD
        type: Custom
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
        spec:
          execution:
            steps:
              # ── Gate: PROD Approval ──
              - step:
                  name: PROD Approval
                  identifier: PROD_Approval
                  type: HarnessApproval
                  timeout: 10s
                  spec:
                    approvalMessage: |-
                      Approving all 10 components for deployment to PROD
                      Auth v<+pipeline.variables.authVer> | Payments v<+pipeline.variables.payVer> | Inventory v<+pipeline.variables.invVer>
                      Notifications v<+pipeline.variables.notifVer> | Analytics v<+pipeline.variables.anlytVer>
                      Storefront v<+pipeline.variables.sfVer> | Admin v<+pipeline.variables.adminVer> | Mobile API v<+pipeline.variables.mobileVer>
                      CDN v<+pipeline.variables.cdnVer> | Docs v<+pipeline.variables.docsVer>
                      CI: Build Lint Test — all 10 repos passed
                      Build: #<+pipeline.variables.buildNumber>
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    isAutoRejectEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Timeout
                        action:
                          type: MarkAsSuccess

              # ── Deploy Auth Service (sequential) ──
              - step:
                  name: Deploy Auth Service
                  identifier: PROD_Deploy_Auth_Service
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "╔══════════════════════════════════════╗"
                          echo "║  DEPLOY — AUTH SERVICE               ║"
                          echo "╚══════════════════════════════════════╝"
                          echo ""
                          echo "📋 Component: Auth Service v<+pipeline.variables.authVer>"
                          echo "   Change:   <+pipeline.variables.authChange>"
                          echo "   CI:       ✔ Build ✔ Lint ✔ Test"
                          echo "   Source:   https://github.com/pdutta25/bikeshop-auth"
                          echo ""
                          echo "✅ Auth Service deployed to PROD"

              # ── Deploy Payment Service (sequential after Auth) ──
              - step:
                  name: Deploy Payment Service
                  identifier: PROD_Deploy_Payment_Service
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash
                          echo "╔══════════════════════════════════════╗"
                          echo "║  DEPLOY — PAYMENT SERVICE            ║"
                          echo "╚══════════════════════════════════════╝"
                          echo ""
                          echo "📋 Component: Payment Service v<+pipeline.variables.payVer>"
                          echo "   Change:   <+pipeline.variables.payChange>"
                          echo "   CI:       ✔ Build ✔ Lint ✔ Test"
                          echo "   Source:   https://github.com/pdutta25/bikeshop-payments"
                          echo ""
