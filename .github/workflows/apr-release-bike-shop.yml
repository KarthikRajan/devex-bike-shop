name: Apr Release - Bike Shop

on:
  push:
    branches: [main]
    paths:
      - 'harness/apr-release-bike-shop.yaml'
      - '.github/workflows/apr-release-bike-shop.yml'
      - 'release-components.json'
  repository_dispatch:
    types: [component-updated]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger-harness:
    name: 🚀 Trigger Harness (Apr Release)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch component manifests
        id: manifests
        run: |
          echo "📦 Reading release-components.json..."
          CONFIG=$(cat release-components.json)
          ORG=$(echo "$CONFIG" | jq -r '.org')
          BUST=$(date +%s)
          COUNT=$(echo "$CONFIG" | jq '.components | length')
          echo "   Found $COUNT components in config"
          echo ""

          # Loop through each component, fetch its manifest
          echo "$CONFIG" | jq -c '.components[]' | while IFS= read -r COMP; do
            REPO=$(echo "$COMP" | jq -r '.repo')
            ALIAS=$(echo "$COMP" | jq -r '.alias')
            LABEL=$(echo "$COMP" | jq -r '.label')
            M=$(curl -sf "https://raw.githubusercontent.com/${ORG}/${REPO}/main/manifest.json?t=$BUST" || echo '{}')
            VER=$(echo "$M" | jq -r '.version // "unknown"')
            CHANGE=$(echo "$M" | jq -r '.lastChange // "unknown"')
            echo "  ${LABEL} (${REPO}): v${VER} — ${CHANGE}"
            echo "${ALIAS}_ver=${VER}" >> $GITHUB_OUTPUT
            echo "${ALIAS}_change=${CHANGE}" >> $GITHUB_OUTPUT
          done

          echo ""
          echo "✅ All $COUNT component manifests fetched"

      - name: Deploy via Harness CD Pipeline (Apr Release)
        env:
          HARNESS_API_KEY: ${{ secrets.HARNESS_API_KEY }}
          HARNESS_ACCOUNT_ID: ${{ secrets.HARNESS_ACCOUNT_ID }}
          HARNESS_ORG_ID: ${{ secrets.HARNESS_ORG_ID }}
          HARNESS_PROJECT_ID: ${{ secrets.HARNESS_PROJECT_ID }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_RUN: ${{ github.run_number }}
          GIT_RUN_ID: ${{ github.run_id }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          TRIGGER_REPO: ${{ github.event.client_payload.repo || github.repository }}
        run: |
          PIPELINE_ID="aprreleasebikeshop"
          SHORT_SHA="${GIT_SHA:0:7}"
          BASE_URL="https://app.harness.io/pipeline/api"
          SCOPE="accountIdentifier=${HARNESS_ACCOUNT_ID}&orgIdentifier=${HARNESS_ORG_ID}&projectIdentifier=${HARNESS_PROJECT_ID}"
          EXEC_NAME="apr-${SHORT_SHA}-${GIT_RUN}"

          # Step 1: Ensure pipeline exists (create if missing, update if exists)
          echo "📋 Ensuring Apr Release pipeline exists..."
          YAML=$(cat harness/apr-release-bike-shop.yaml)
          CREATE_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${BASE_URL}/pipelines/v2?${SCOPE}" \
            -H "Content-Type: application/yaml" \
            -H "x-api-key: ${HARNESS_API_KEY}" \
            -d "$YAML")

          CREATE_CODE=$(echo "$CREATE_RESPONSE" | tail -1)
          if [ "$CREATE_CODE" -ge 200 ] && [ "$CREATE_CODE" -lt 300 ]; then
            echo "✅ Pipeline created"
          elif [ "$CREATE_CODE" -eq 409 ] || ([ "$CREATE_CODE" -eq 400 ] && echo "$CREATE_RESPONSE" | grep -q "DUPLICATE_FIELD"); then
            echo "ℹ️  Pipeline already exists — updating..."
            UPDATE_RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
              "${BASE_URL}/pipelines/v2/${PIPELINE_ID}?${SCOPE}" \
              -H "Content-Type: application/yaml" \
              -H "x-api-key: ${HARNESS_API_KEY}" \
              -d "$YAML")
            UPDATE_CODE=$(echo "$UPDATE_RESPONSE" | tail -1)
            if [ "$UPDATE_CODE" -ge 200 ] && [ "$UPDATE_CODE" -lt 300 ]; then
              echo "✅ Pipeline updated"
            else
              UPDATE_BODY=$(echo "$UPDATE_RESPONSE" | head -n -1)
              echo "⚠️  Pipeline update returned HTTP $UPDATE_CODE (non-blocking)"
              echo "   Response: $UPDATE_BODY"
            fi
          else
            CREATE_BODY=$(echo "$CREATE_RESPONSE" | head -n -1)
            echo "❌ Failed to ensure pipeline (HTTP $CREATE_CODE)"
            echo "   Response: $CREATE_BODY"
            exit 1
          fi

          # Step 2: Execute pipeline
          echo ""
          echo "▶️  Executing Apr Release pipeline: $EXEC_NAME"
          PAYLOAD=$(jq -n \
            --arg name "$EXEC_NAME" \
            --arg sha "$SHORT_SHA" \
            --arg build "$GIT_RUN" \
            --arg branch "$GIT_BRANCH" \
            --arg repo "$REPO_URL" \
            --arg runid "$GIT_RUN_ID" \
            --arg triggerrepo "$TRIGGER_REPO" \
            --arg authver "${{ steps.manifests.outputs.auth_ver }}" \
            --arg authchange "${{ steps.manifests.outputs.auth_change }}" \
            --arg payver "${{ steps.manifests.outputs.pay_ver }}" \
            --arg paychange "${{ steps.manifests.outputs.pay_change }}" \
            --arg invver "${{ steps.manifests.outputs.inv_ver }}" \
            --arg invchange "${{ steps.manifests.outputs.inv_change }}" \
            --arg notifver "${{ steps.manifests.outputs.notif_ver }}" \
            --arg notifchange "${{ steps.manifests.outputs.notif_change }}" \
            --arg anlytver "${{ steps.manifests.outputs.anlyt_ver }}" \
            --arg anlytchange "${{ steps.manifests.outputs.anlyt_change }}" \
            --arg sfver "${{ steps.manifests.outputs.sf_ver }}" \
            --arg sfchange "${{ steps.manifests.outputs.sf_change }}" \
            --arg adminver "${{ steps.manifests.outputs.admin_ver }}" \
            --arg adminchange "${{ steps.manifests.outputs.admin_change }}" \
            --arg mobilever "${{ steps.manifests.outputs.mobile_ver }}" \
            --arg mobilechange "${{ steps.manifests.outputs.mobile_change }}" \
            --arg cdnver "${{ steps.manifests.outputs.cdn_ver }}" \
            --arg cdnchange "${{ steps.manifests.outputs.cdn_change }}" \
            --arg docsver "${{ steps.manifests.outputs.docs_ver }}" \
            --arg docschange "${{ steps.manifests.outputs.docs_change }}" \
            '{
              notesForPipelineExecution: ("Apr Release | Run #" + $build + " | Branch: " + $branch + " | Commit: " + $sha + " | Trigger: " + $triggerrepo),
              pipeline: {
                identifier: "aprreleasebikeshop",
                tags: {
                  commitSha: $sha,
                  buildNumber: $build,
                  branch: $branch,
                  executionName: $name
                },
                variables: [
                  { name: "commitSha", type: "String", value: $sha },
                  { name: "buildNumber", type: "String", value: $build },
                  { name: "branch", type: "String", value: $branch },
                  { name: "prNumber", type: "String", value: "none" },
                  { name: "triggeredBy", type: "String", value: ("GitHub Actions (" + $triggerrepo + ")") },
                  { name: "repoUrl", type: "String", value: $repo },
                  { name: "runId", type: "String", value: $runid },
                  { name: "triggerRepo", type: "String", value: $triggerrepo },
                  { name: "authVer", type: "String", value: $authver },
                  { name: "authChange", type: "String", value: $authchange },
                  { name: "payVer", type: "String", value: $payver },
                  { name: "payChange", type: "String", value: $paychange },
                  { name: "invVer", type: "String", value: $invver },
                  { name: "invChange", type: "String", value: $invchange },
                  { name: "notifVer", type: "String", value: $notifver },
                  { name: "notifChange", type: "String", value: $notifchange },
                  { name: "anlytVer", type: "String", value: $anlytver },
                  { name: "anlytChange", type: "String", value: $anlytchange },
                  { name: "sfVer", type: "String", value: $sfver },
                  { name: "sfChange", type: "String", value: $sfchange },
                  { name: "adminVer", type: "String", value: $adminver },
                  { name: "adminChange", type: "String", value: $adminchange },
                  { name: "mobileVer", type: "String", value: $mobilever },
                  { name: "mobileChange", type: "String", value: $mobilechange },
                  { name: "cdnVer", type: "String", value: $cdnver },
                  { name: "cdnChange", type: "String", value: $cdnchange },
                  { name: "docsVer", type: "String", value: $docsver },
                  { name: "docsChange", type: "String", value: $docschange }
                ]
              }
            }')

          EXEC_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${BASE_URL}/pipeline/execute/${PIPELINE_ID}?${SCOPE}" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${HARNESS_API_KEY}" \
            -d "$PAYLOAD")

          EXEC_CODE=$(echo "$EXEC_RESPONSE" | tail -1)
          EXEC_BODY=$(echo "$EXEC_RESPONSE" | head -n -1)
          echo ""
          if [ "$EXEC_CODE" -ge 200 ] && [ "$EXEC_CODE" -lt 300 ]; then
            EXEC_ID=$(echo "$EXEC_BODY" | jq -r '.data.planExecution.uuid // "unknown"')
            echo "✅ Apr Release pipeline executing (HTTP $EXEC_CODE)"
            echo "   Execution: $EXEC_NAME"
            echo "   Commit: $SHORT_SHA"
            echo "   ID: $EXEC_ID"
          else
            echo "⚠️  Harness execute returned HTTP $EXEC_CODE"
            echo "   Response: $EXEC_BODY"
            exit 1
          fi
