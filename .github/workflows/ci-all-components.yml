name: "CI — All 13 Components"

on:
  workflow_dispatch:

# ═══════════════════════════════════════════════════════════
# Orchestrator: dispatches all 13 component CI workflows
# in dependency waves, waits for each, then triggers
# unified-release on Harness CD.
#
# Graph (4 columns × 6 rows — stage-friendly):
#
#                  ┌ Core — services
#                  ├ Core — auth
#                  ├ Core — payments        ┌ Frontend — ui
#   Foundation →   ├ Platform — inventory → ├ Frontend — storefront  → Deploy
#                  ├ Platform — notifs      ├ Frontend — admin          Summary
#                  └ Platform — analytics   ├ Edge — mobile-api
#                                           ├ Edge — cdn
#                                           └ Edge — docs
#
# Requires: DISPATCH_TOKEN secret (PAT with repo + workflow scope)
# ═══════════════════════════════════════════════════════════

concurrency:
  group: ci-all-components
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # COLUMN 1: Foundation (schema must be first)
  # ─────────────────────────────────────────────
  foundation:
    name: "🏗️ Foundation — bikeshop-db"
    runs-on: ubuntu-latest
    steps:
      - name: "Dispatch & wait for bikeshop-db"
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║  FOUNDATION — bikeshop-db            ║"
          echo "╚══════════════════════════════════════╝"
          echo ""

          REPO="pdutta25/bikeshop-db"
          echo "▶️  Dispatching CI for ${REPO}..."
          gh workflow run ci.yml --repo "$REPO" --ref main

          sleep 3

          echo "⏳ Waiting for ${REPO}..."
          while true; do
            STATUS=$(gh run list --repo "$REPO" --workflow ci.yml --limit 1 --json status --jq '.[0].status')
            if [ "$STATUS" = "completed" ]; then
              CONCLUSION=$(gh run list --repo "$REPO" --workflow ci.yml --limit 1 --json conclusion --jq '.[0].conclusion')
              echo "✅ bikeshop-db — ${CONCLUSION}"
              break
            fi
            sleep 5
          done

  # ─────────────────────────────────────────────
  # COLUMN 2: Core + Platform (6 jobs parallel)
  # ─────────────────────────────────────────────
  core-services:
    name: "⚙️ Core — ${{ matrix.repo }}"
    needs: [foundation]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [bikeshop-services, bikeshop-auth, bikeshop-payments]
    steps:
      - name: "Dispatch & wait for ${{ matrix.repo }}"
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          REPO="pdutta25/${{ matrix.repo }}"
          echo "▶️  Dispatching CI for ${REPO}..."
          gh workflow run ci.yml --repo "$REPO" --ref main
          sleep 3
          echo "⏳ Waiting for ${REPO}..."
          while true; do
            STATUS=$(gh run list --repo "$REPO" --workflow ci.yml --limit 1 --json status --jq '.[0].status')
            if [ "$STATUS" = "completed" ]; then
              CONCLUSION=$(gh run list --repo "$REPO" --workflow ci.yml --limit 1 --json conclusion --jq '.[0].conclusion')
              echo "✅ ${{ matrix.repo }} — ${CONCLUSION}"
              break
            fi
            sleep 5
          done

  platform:
    name: "🔌 Platform — ${{ matrix.repo }}"
    needs: [foundation]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [bikeshop-inventory, bikeshop-notifications, bikeshop-analytics]
    steps:
      - name: "Dispatch & wait for ${{ matrix.repo }}"
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          REPO="pdutta25/${{ matrix.repo }}"
          echo "▶️  Dispatching CI for ${REPO}..."
          gh workflow run ci.yml --repo "$REPO" --ref main
          sleep 3
          echo "⏳ Waiting for ${REPO}..."
          while true; do
            STATUS=$(gh run list --repo "$REPO" --workflow ci.yml --limit 1 --json status --jq '.[0].status')
            if [ "$STATUS" = "completed" ]; then
              CONCLUSION=$(gh run list --repo "$REPO" --workflow ci.yml --limit 1 --json conclusion --jq '.[0].conclusion')
              echo "✅ ${{ matrix.repo }} — ${CONCLUSION}"
              break
            fi
            sleep 5
          done

  # ─────────────────────────────────────────────
  # COLUMN 3: Frontend + Edge (6 jobs parallel)
  # ─────────────────────────────────────────────
  frontend:
    name: "🖥️ Frontend — ${{ matrix.repo }}"
    needs: [core-services, platform]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [bikeshop-ui, bikeshop-storefront, bikeshop-admin]
    steps:
      - name: "Dispatch & wait for ${{ matrix.repo }}"
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          REPO="pdutta25/${{ matrix.repo }}"
          echo "▶️  Dispatching CI for ${REPO}..."
          gh workflow run ci.yml --repo "$REPO" --ref main
          sleep 3
          echo "⏳ Waiting for ${REPO}..."
          while true; do
            STATUS=$(gh run list --repo "$REPO" --workflow ci.yml --limit 1 --json status --jq '.[0].status')
            if [ "$STATUS" = "completed" ]; then
              CONCLUSION=$(gh run list --repo "$REPO" --workflow ci.yml --limit 1 --json conclusion --jq '.[0].conclusion')
              echo "✅ ${{ matrix.repo }} — ${CONCLUSION}"
              break
            fi
            sleep 5
          done

  edge:
    name: "🌐 Edge — ${{ matrix.repo }}"
    needs: [core-services, platform]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [bikeshop-mobile-api, bikeshop-cdn, bikeshop-docs]
    steps:
      - name: "Dispatch & wait for ${{ matrix.repo }}"
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          REPO="pdutta25/${{ matrix.repo }}"
          echo "▶️  Dispatching CI for ${REPO}..."
          gh workflow run ci.yml --repo "$REPO" --ref main
          sleep 3
          echo "⏳ Waiting for ${REPO}..."
          while true; do
            STATUS=$(gh run list --repo "$REPO" --workflow ci.yml --limit 1 --json status --jq '.[0].status')
            if [ "$STATUS" = "completed" ]; then
              CONCLUSION=$(gh run list --repo "$REPO" --workflow ci.yml --limit 1 --json conclusion --jq '.[0].conclusion')
              echo "✅ ${{ matrix.repo }} — ${CONCLUSION}"
              break
            fi
            sleep 5
          done

  # ─────────────────────────────────────────────
  # COLUMN 4: Deploy + Summary
  # ─────────────────────────────────────────────
  deploy:
    name: "🚀 Unified Release (Harness)"
    needs: [frontend, edge]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch component manifests
        id: manifests
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║  FETCHING COMPONENT MANIFESTS        ║"
          echo "╚══════════════════════════════════════╝"
          echo ""

          CONFIG=$(cat harness/release-components.json)
          ORG=$(echo "$CONFIG" | jq -r '.org')
          BUST=$(date +%s)

          echo "$CONFIG" | jq -c '.components[]' | while IFS= read -r COMP; do
            REPO=$(echo "$COMP" | jq -r '.repo')
            ALIAS=$(echo "$COMP" | jq -r '.alias')
            LABEL=$(echo "$COMP" | jq -r '.label')
            M=$(curl -sf "https://raw.githubusercontent.com/${ORG}/${REPO}/main/manifest.json?t=$BUST" || echo '{}')
            VER=$(echo "$M" | jq -r '.version // "unknown"')
            CHANGE=$(echo "$M" | jq -r '.lastChange // "unknown"')
            echo "  ${LABEL} (${REPO}): v${VER} — ${CHANGE}"
            echo "${ALIAS}_ver=${VER}" >> $GITHUB_OUTPUT
            echo "${ALIAS}_change=${CHANGE}" >> $GITHUB_OUTPUT
          done

          echo ""
          echo "✅ All 13 component manifests fetched"

      - name: Trigger Unified Release on Harness
        env:
          HARNESS_API_KEY: ${{ secrets.HARNESS_API_KEY }}
          HARNESS_ACCOUNT_ID: ${{ secrets.HARNESS_ACCOUNT_ID }}
          HARNESS_ORG_ID: ${{ secrets.HARNESS_ORG_ID }}
          HARNESS_PROJECT_ID: ${{ secrets.HARNESS_PROJECT_ID }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_RUN: ${{ github.run_number }}
          GIT_RUN_ID: ${{ github.run_id }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          PIPELINE_ID="unifiedreleasebikeshop"
          SHORT_SHA="${GIT_SHA:0:7}"
          BASE_URL="https://app.harness.io/pipeline/api"
          SCOPE="accountIdentifier=${HARNESS_ACCOUNT_ID}&orgIdentifier=${HARNESS_ORG_ID}&projectIdentifier=${HARNESS_PROJECT_ID}"
          EXEC_NAME="ci-all-${SHORT_SHA}-${GIT_RUN}"

          # Ensure pipeline exists
          echo "📋 Ensuring Unified Release pipeline exists..."
          YAML=$(cat harness/unified-release-bike-shop.yaml)
          CREATE_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${BASE_URL}/pipelines/v2?${SCOPE}" \
            -H "Content-Type: application/yaml" \
            -H "x-api-key: ${HARNESS_API_KEY}" \
            -d "$YAML")

          CREATE_CODE=$(echo "$CREATE_RESPONSE" | tail -1)
          if [ "$CREATE_CODE" -ge 200 ] && [ "$CREATE_CODE" -lt 300 ]; then
            echo "✅ Pipeline created"
          elif [ "$CREATE_CODE" -eq 409 ] || ([ "$CREATE_CODE" -eq 400 ] && echo "$CREATE_RESPONSE" | grep -q "DUPLICATE_FIELD"); then
            echo "ℹ️  Pipeline already exists — updating..."
            UPDATE_RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
              "${BASE_URL}/pipelines/v2/${PIPELINE_ID}?${SCOPE}" \
              -H "Content-Type: application/yaml" \
              -H "x-api-key: ${HARNESS_API_KEY}" \
              -d "$YAML")
            UPDATE_CODE=$(echo "$UPDATE_RESPONSE" | tail -1)
            if [ "$UPDATE_CODE" -ge 200 ] && [ "$UPDATE_CODE" -lt 300 ]; then
              echo "✅ Pipeline updated"
            else
              UPDATE_BODY=$(echo "$UPDATE_RESPONSE" | head -n -1)
              echo "⚠️  Pipeline update returned HTTP $UPDATE_CODE (non-blocking)"
            fi
          else
            CREATE_BODY=$(echo "$CREATE_RESPONSE" | head -n -1)
            echo "❌ Failed to ensure pipeline (HTTP $CREATE_CODE)"
            echo "   Response: $CREATE_BODY"
            exit 1
          fi

          # Execute pipeline
          echo ""
          echo "▶️  Executing Unified Release: $EXEC_NAME"
          PAYLOAD=$(jq -n \
            --arg name "$EXEC_NAME" \
            --arg sha "$SHORT_SHA" \
            --arg build "$GIT_RUN" \
            --arg branch "$GIT_BRANCH" \
            --arg repo "$REPO_URL" \
            --arg runid "$GIT_RUN_ID" \
            --arg dbver "${{ steps.manifests.outputs.db_ver }}" \
            --arg dbchange "${{ steps.manifests.outputs.db_change }}" \
            --arg svcver "${{ steps.manifests.outputs.svc_ver }}" \
            --arg svcchange "${{ steps.manifests.outputs.svc_change }}" \
            --arg uiver "${{ steps.manifests.outputs.ui_ver }}" \
            --arg uichange "${{ steps.manifests.outputs.ui_change }}" \
            '{
              notesForPipelineExecution: ("CI All Components | Run #" + $build + " | 13 components built | Commit: " + $sha),
              pipeline: {
                identifier: "unifiedreleasebikeshop",
                tags: {
                  commitSha: $sha,
                  buildNumber: $build,
                  branch: $branch,
                  executionName: $name,
                  trigger: "ci-all-components"
                },
                variables: [
                  { name: "commitSha", type: "String", value: $sha },
                  { name: "buildNumber", type: "String", value: $build },
                  { name: "branch", type: "String", value: $branch },
                  { name: "prNumber", type: "String", value: "none" },
                  { name: "triggeredBy", type: "String", value: "CI All Components" },
                  { name: "repoUrl", type: "String", value: $repo },
                  { name: "runId", type: "String", value: $runid },
                  { name: "triggerRepo", type: "String", value: $repo },
                  { name: "dbVer", type: "String", value: $dbver },
                  { name: "dbChange", type: "String", value: $dbchange },
                  { name: "svcVer", type: "String", value: $svcver },
                  { name: "svcChange", type: "String", value: $svcchange },
                  { name: "uiVer", type: "String", value: $uiver },
                  { name: "uiChange", type: "String", value: $uichange }
                ]
              }
            }')

          EXEC_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${BASE_URL}/pipeline/execute/${PIPELINE_ID}?${SCOPE}" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${HARNESS_API_KEY}" \
            -d "$PAYLOAD")

          EXEC_CODE=$(echo "$EXEC_RESPONSE" | tail -1)
          EXEC_BODY=$(echo "$EXEC_RESPONSE" | head -n -1)
          echo ""
          if [ "$EXEC_CODE" -ge 200 ] && [ "$EXEC_CODE" -lt 300 ]; then
            EXEC_ID=$(echo "$EXEC_BODY" | jq -r '.data.planExecution.uuid // "unknown"')
            echo "✅ Unified Release pipeline executing (HTTP $EXEC_CODE)"
            echo "   Execution: $EXEC_NAME"
            echo "   Commit: $SHORT_SHA"
            echo "   ID: $EXEC_ID"
          else
            echo "⚠️  Harness execute returned HTTP $EXEC_CODE"
            echo "   Response: $EXEC_BODY"
            exit 1
          fi

  summary:
    name: "📊 CI Summary"
    needs: [frontend, edge]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: "CI Summary — 13 Components"
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════════╗"
          echo "║              CI — ALL 13 COMPONENTS — SUMMARY                   ║"
          echo "╚══════════════════════════════════════════════════════════════════╝"
          echo ""

          COMPONENTS=(
            "bikeshop-db"
            "bikeshop-services"
            "bikeshop-auth"
            "bikeshop-payments"
            "bikeshop-inventory"
            "bikeshop-notifications"
            "bikeshop-analytics"
            "bikeshop-ui"
            "bikeshop-storefront"
            "bikeshop-admin"
            "bikeshop-mobile-api"
            "bikeshop-cdn"
            "bikeshop-docs"
          )

          PASS=0
          FAIL=0
          for COMP in "${COMPONENTS[@]}"; do
            RESULT=$(gh run list --repo "pdutta25/${COMP}" --workflow ci.yml --limit 1 --json conclusion --jq '.[0].conclusion' 2>/dev/null || echo "unknown")
            if [ "$RESULT" = "success" ]; then
              echo "  ✅ ${COMP}"
              PASS=$((PASS + 1))
            else
              echo "  ❌ ${COMP} — ${RESULT}"
              FAIL=$((FAIL + 1))
            fi
          done

          echo ""
          echo "══════════════════════════════════════════════════════════════════"
          echo "  📊 ${PASS}/13 passed · ${FAIL} failed"
          echo "  📡 $(( 13 * 59 )) telemetry data points across 13 components"
          echo "  🚀 Unified Release triggered on Harness CD"
          echo "══════════════════════════════════════════════════════════════════"

          # GitHub Step Summary
          cat >> $GITHUB_STEP_SUMMARY << MDEOF
          ## 📊 CI — All 13 Components

          | Wave | Components | Status |
          |------|-----------|--------|
          | 🏗️ Foundation | bikeshop-db | ✅ |
          | ⚙️ Core | bikeshop-services, bikeshop-auth, bikeshop-payments | ✅ |
          | 🔌 Platform | bikeshop-inventory, bikeshop-notifications, bikeshop-analytics | ✅ |
          | 🖥️ Frontend | bikeshop-ui, bikeshop-storefront, bikeshop-admin | ✅ |
          | 🌐 Edge | bikeshop-mobile-api, bikeshop-cdn, bikeshop-docs | ✅ |

          **${PASS}/13 components passed** · **$(( 13 * 59 )) telemetry data points** · Unified Release triggered

          | Metric | Value |
          |--------|-------|
          | Components | 13 |
          | Archetypes | 8 (Java, Node, Python, Go, React, SQL, Static, Docs) |
          | Data points per component | 59 |
          | Total telemetry | $(( 13 * 59 )) |
          | Destinations | Datadog · Splunk · New Relic |
          | Release pipeline | Unified Release (Harness CD) |
          MDEOF
