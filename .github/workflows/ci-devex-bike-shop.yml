name: CI Pipeline - Bike Shop

on:
  push:
    branches: [main]
    paths:
      - 'harness/ci-devex-bike-shop.yaml'
      - '.github/workflows/ci-devex-bike-shop.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger-harness:
    name: "\U0001F680 Trigger Harness CI Pipeline"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy via Harness CD Pipeline (CI)
        env:
          HARNESS_API_KEY: ${{ secrets.HARNESS_API_KEY }}
          HARNESS_ACCOUNT_ID: ${{ secrets.HARNESS_ACCOUNT_ID }}
          HARNESS_ORG_ID: ${{ secrets.HARNESS_ORG_ID }}
          HARNESS_PROJECT_ID: ${{ secrets.HARNESS_PROJECT_ID }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_RUN: ${{ github.run_number }}
          GIT_RUN_ID: ${{ github.run_id }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          PIPELINE_ID="cidevexbikeshop"
          SHORT_SHA="${GIT_SHA:0:7}"
          BASE_URL="https://app.harness.io/pipeline/api"
          SCOPE="accountIdentifier=${HARNESS_ACCOUNT_ID}&orgIdentifier=${HARNESS_ORG_ID}&projectIdentifier=${HARNESS_PROJECT_ID}"
          EXEC_NAME="ci-${SHORT_SHA}-${GIT_RUN}"

          # Step 1: Ensure pipeline exists (create if missing, update if exists)
          echo "📋 Ensuring CI pipeline exists..."
          YAML=$(cat harness/ci-devex-bike-shop.yaml)
          CREATE_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${BASE_URL}/pipelines/v2?${SCOPE}" \
            -H "Content-Type: application/yaml" \
            -H "x-api-key: ${HARNESS_API_KEY}" \
            -d "$YAML")

          CREATE_CODE=$(echo "$CREATE_RESPONSE" | tail -1)
          if [ "$CREATE_CODE" -ge 200 ] && [ "$CREATE_CODE" -lt 300 ]; then
            echo "✅ Pipeline created"
          elif [ "$CREATE_CODE" -eq 409 ] || ([ "$CREATE_CODE" -eq 400 ] && echo "$CREATE_RESPONSE" | grep -q "DUPLICATE_FIELD"); then
            echo "ℹ️  Pipeline already exists — updating..."
            UPDATE_RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
              "${BASE_URL}/pipelines/v2/${PIPELINE_ID}?${SCOPE}" \
              -H "Content-Type: application/yaml" \
              -H "x-api-key: ${HARNESS_API_KEY}" \
              -d "$YAML")
            UPDATE_CODE=$(echo "$UPDATE_RESPONSE" | tail -1)
            if [ "$UPDATE_CODE" -ge 200 ] && [ "$UPDATE_CODE" -lt 300 ]; then
              echo "✅ Pipeline updated"
            else
              UPDATE_BODY=$(echo "$UPDATE_RESPONSE" | head -n -1)
              echo "⚠️  Pipeline update returned HTTP $UPDATE_CODE (non-blocking)"
              echo "   Response: $UPDATE_BODY"
            fi
          else
            CREATE_BODY=$(echo "$CREATE_RESPONSE" | head -n -1)
            echo "❌ Failed to ensure pipeline (HTTP $CREATE_CODE)"
            echo "   Response: $CREATE_BODY"
            exit 1
          fi

          # Step 2: Execute pipeline
          echo ""
          echo "▶️  Executing CI pipeline: $EXEC_NAME"
          PAYLOAD=$(jq -n \
            --arg name "$EXEC_NAME" \
            --arg sha "$SHORT_SHA" \
            --arg build "$GIT_RUN" \
            --arg branch "$GIT_BRANCH" \
            --arg repo "$REPO_URL" \
            --arg runid "$GIT_RUN_ID" \
            '{
              notesForPipelineExecution: ("CI Pipeline | Run #" + $build + " | Branch: " + $branch + " | Commit: " + $sha),
              pipeline: {
                identifier: "cidevexbikeshop",
                tags: {
                  commitSha: $sha,
                  buildNumber: $build,
                  branch: $branch,
                  executionName: $name
                }
              }
            }')

          EXEC_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${BASE_URL}/pipeline/execute/${PIPELINE_ID}?${SCOPE}" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${HARNESS_API_KEY}" \
            -d "$PAYLOAD")

          EXEC_CODE=$(echo "$EXEC_RESPONSE" | tail -1)
          EXEC_BODY=$(echo "$EXEC_RESPONSE" | head -n -1)
          echo ""
          if [ "$EXEC_CODE" -ge 200 ] && [ "$EXEC_CODE" -lt 300 ]; then
            EXEC_ID=$(echo "$EXEC_BODY" | jq -r '.data.planExecution.uuid // "unknown"')
            echo "✅ CI pipeline executing (HTTP $EXEC_CODE)"
            echo "   Execution: $EXEC_NAME"
            echo "   Commit: $SHORT_SHA"
            echo "   ID: $EXEC_ID"
          else
            echo "⚠️  Harness execute returned HTTP $EXEC_CODE"
            echo "   Response: $EXEC_BODY"
            exit 1
          fi
