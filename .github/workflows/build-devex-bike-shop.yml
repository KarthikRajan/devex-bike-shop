name: CI-CD

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/dependabot.yml'
      - 'LICENSE'
      - 'harness/**'
      - 'slides/**'
      - '.github/workflows/*-release-bike-shop*'
      - '.github/workflows/trigger-release*'
      - '.github/workflows/ci-all-components*'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/dependabot.yml'
      - 'LICENSE'
      - 'harness/**'
      - 'slides/**'
      - '.github/workflows/*-release-bike-shop*'
      - '.github/workflows/trigger-release*'
      - '.github/workflows/ci-all-components*'
  workflow_dispatch:
    inputs:
      test_deploy:
        description: 'Force deploy step (for testing)'
        type: boolean
        default: false

# Cancel in-progress runs for the same branch (saves runner minutes on rapid pushes)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ═══════════════════════════════════════════════════════════
# PIPELINE GRAPH (visible in GitHub Actions UI):
#
#            ┌──→ 🛡️ Security Scan       ──┐
#   build ──┤──→ 📊 Code Quality         ──┤
#   lint  ──┤──→ 📦 Publish              ──┼──→ 🚀 Deploy (Harness)
#   test  ──┤──→ ✅ Compliance           ──┤
#            ├──→ 🤖 Release Notes
#            └──→ 📚 Wiki Updates
#
# Demo line: "Build, lint, test pass — then 6 things fire
# in parallel: security scan, code quality, publish 13
# artifacts to JFrog, compliance validates every SBOM and
# signs an attestation, plus release notes and wiki. Only
# when everything clears does the deployment gate open and
# trigger Harness."
# ═══════════════════════════════════════════════════════════

jobs:
  # ─────────────────────────────────────────────
  # STAGE 1a: BUILD (runs in parallel with lint & test)
  # ─────────────────────────────────────────────
  build:
    name: 🔨 Build
    if: ${{ !inputs.test_deploy }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Application
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║       BUILD                          ║"
          echo "╚══════════════════════════════════════╝"
          npm run build
          echo "✅ Build completed successfully"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1

  # ─────────────────────────────────────────────
  # STAGE 1b: LINT (runs in parallel with build & test)
  # ─────────────────────────────────────────────
  lint:
    name: 📋 Lint
    if: ${{ !inputs.test_deploy }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        continue-on-error: true
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║       LINTING — ESLint Check         ║"
          echo "╚══════════════════════════════════════╝"
          npx next lint --no-cache 2>&1 | tee /tmp/lint-output.txt
          LINT_EXIT=${PIPESTATUS[0]}
          echo ""
          if [ "$LINT_EXIT" -eq 0 ]; then
            echo "✅ Linting passed — no issues found"
          else
            echo "⚠️  Lint issues found (non-blocking for demo)"
            echo "   Exit code: $LINT_EXIT"
          fi

  # ─────────────────────────────────────────────
  # STAGE 1c: TEST (runs in parallel with build & lint)
  # ─────────────────────────────────────────────
  test:
    name: 🧪 Test
    if: ${{ !inputs.test_deploy }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║       UNIT TESTING (Vitest)          ║"
          echo "╚══════════════════════════════════════╝"
          npm test
          echo "✅ Unit tests passed"

  # ─────────────────────────────────────────────
  # STAGE 2a: SECURITY SCAN — find vulnerabilities first
  # ─────────────────────────────────────────────
  a-security-scan:
    name: 🛡️ Security Scan
    needs: [build, lint, test]
    if: ${{ !inputs.test_deploy }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Dependency Vulnerability Check (npm audit)
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║  DEPENDENCY VULNERABILITY CHECK      ║"
          echo "║  (npm audit)                         ║"
          echo "╚══════════════════════════════════════╝"
          echo ""
          npm audit --omit=dev 2>&1 || true
          echo ""
          echo "✅ npm audit completed"

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'table'

  # ─────────────────────────────────────────────
  # STAGE 2b: CODE QUALITY — check code standards
  # ─────────────────────────────────────────────
  b-code-quality:
    name: 📊 Code Quality
    needs: [build, lint, test]
    if: ${{ !inputs.test_deploy }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.sources=src/
            -Dsonar.exclusions=**/node_modules/**,**/__tests__/**
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

  # ─────────────────────────────────────────────
  # STAGE 2c: PUBLISH — push clean artifacts to registry
  # ─────────────────────────────────────────────
  c-publish:
    name: 📦 Publish
    needs: [build, lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Publish 13 Component Artifacts to JFrog
        run: |
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║   PUBLISHING ARTIFACTS → JFrog Artifactory          ║"
          echo "╚══════════════════════════════════════════════════════╝"
          echo ""
          SHORT_SHA="${GITHUB_SHA:0:7}"
          VERSION="1.0.${{ github.run_number }}"
          REGISTRY="bikeshop.jfrog.io/bikeshop-docker"
          echo "  Registry:  $REGISTRY"
          echo "  Version:   $VERSION"
          echo "  Commit:    $SHORT_SHA"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          COMPONENTS=(
            "storefront:frontend:248MB"
            "admin:frontend:185MB"
            "mobile-api:backend:142MB"
            "auth:backend:98MB"
            "payments:backend:112MB"
            "inventory:backend:105MB"
            "notifications:backend:87MB"
            "analytics:backend:134MB"
            "cdn:infra:67MB"
            "docs:static:34MB"
            "db:database:156MB"
            "services:backend:178MB"
            "ui:frontend:203MB"
          )

          PUBLISHED=0
          for COMP in "${COMPONENTS[@]}"; do
            NAME=$(echo "$COMP" | cut -d: -f1)
            TYPE=$(echo "$COMP" | cut -d: -f2)
            SIZE=$(echo "$COMP" | cut -d: -f3)
            IMAGE="$REGISTRY/bikeshop-${NAME}:${VERSION}"

            # Simulate docker build + push timing
            sleep 1

            PUBLISHED=$((PUBLISHED + 1))
            printf "  ✅ [%2d/13] %-24s  %s  (%s)\n" "$PUBLISHED" "bikeshop-${NAME}:${VERSION}" "$SIZE" "$TYPE"
          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  📦 $PUBLISHED artifacts published to $REGISTRY"
          echo "  🏷️  Tagged: $VERSION + latest"
          echo "  🔒 Signed: cosign v2.2.0"
          echo "  📋 SBOM:   syft v0.98.0 (SPDX)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ─────────────────────────────────────────────
  # STAGE 2d: COMPLIANCE — attest everything before deploy
  # ─────────────────────────────────────────────
  d-compliance:
    name: ✅ Compliance
    needs: [build, lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate and Validate SBOMs
        run: |
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║   SUPPLY CHAIN COMPLIANCE — SBOM & ATTESTATION      ║"
          echo "╚══════════════════════════════════════════════════════╝"
          echo ""
          VERSION="1.0.${{ github.run_number }}"
          SHORT_SHA="${GITHUB_SHA:0:7}"

          COMPONENTS=(
            "storefront:frontend"
            "admin:frontend"
            "mobile-api:backend"
            "auth:backend"
            "payments:backend"
            "inventory:backend"
            "notifications:backend"
            "analytics:backend"
            "cdn:infra"
            "docs:static"
            "db:database"
            "services:backend"
            "ui:frontend"
          )

          echo "  ┌─────────────────────────────────────────────────┐"
          echo "  │  Phase 1: SBOM Generation (syft v0.98.0)        │"
          echo "  └─────────────────────────────────────────────────┘"
          echo ""
          GENERATED=0
          for COMP in "${COMPONENTS[@]}"; do
            NAME=$(echo "$COMP" | cut -d: -f1)
            sleep 0.5
            GENERATED=$((GENERATED + 1))
            printf "  📋 [%2d/13] bikeshop-%-16s SPDX manifest generated\n" "$GENERATED" "$NAME"
          done

          echo ""
          echo "  ┌─────────────────────────────────────────────────┐"
          echo "  │  Phase 2: Signature Verification (cosign v2.2)  │"
          echo "  └─────────────────────────────────────────────────┘"
          echo ""
          VERIFIED=0
          for COMP in "${COMPONENTS[@]}"; do
            NAME=$(echo "$COMP" | cut -d: -f1)
            sleep 0.3
            VERIFIED=$((VERIFIED + 1))
            printf "  🔒 [%2d/13] bikeshop-%-16s signature valid\n" "$VERIFIED" "$NAME"
          done

          echo ""
          echo "  ┌─────────────────────────────────────────────────┐"
          echo "  │  Phase 3: License & CVE Policy Check            │"
          echo "  └─────────────────────────────────────────────────┘"
          echo ""
          echo "  📜 License allow-list:  MIT, Apache-2.0, BSD-2, BSD-3, ISC"
          echo "  🚫 Blocked licenses:   GPL-3.0, AGPL, SSPL"
          sleep 1
          echo "  ✅ 847 dependencies scanned — 0 license violations"
          sleep 0.5
          echo "  ✅ 0 critical CVEs — 0 high CVEs"
          sleep 0.5
          echo "  ✅ All artifacts built from trusted CI (GitHub Actions)"

          echo ""
          echo "  ┌─────────────────────────────────────────────────┐"
          echo "  │  Phase 4: Deployment Attestation                │"
          echo "  └─────────────────────────────────────────────────┘"
          echo ""
          sleep 1
          echo "  📝 Attestation ID:    att-${SHORT_SHA}-${VERSION}"
          echo "  🔑 Signed by:         CI Compliance Bot (cosign keyless)"
          echo "  📦 Artifacts cleared:  13/13"
          echo "  🕐 Generated:         $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ COMPLIANCE PASSED — 13/13 artifacts attested"
          echo "  📄 Deployment manifest ready for Harness"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ─────────────────────────────────────────────
  # STAGE 3: DEPLOY GATE (all checks + compliance passed)
  # ─────────────────────────────────────────────
  deploy-gate:
    name: 🚀 Deploy (Harness)
    needs: [a-security-scan, b-code-quality, c-publish, d-compliance]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: CI Summary
        run: |
          echo ""
          echo "╔══════════════════════════════════════╗"
          echo "║         CI PIPELINE SUMMARY          ║"
          echo "╠══════════════════════════════════════╣"
          echo "║ ✅ Build            — Passed         ║"
          echo "║ ✅ Linting          — Passed         ║"
          echo "║ ✅ Unit Tests       — Passed         ║"
          echo "║ ✅ Security Scan    — Passed         ║"
          echo "║ ✅ Code Quality     — Passed         ║"
          echo "║ 📦 Publish          — 13 artifacts    ║"
          echo "║ ✅ Compliance       — 13/13 attested  ║"
          echo "╠══════════════════════════════════════╣"
          echo "║ Commit: ${{ github.sha }}            ║"
          echo "║ Branch: ${{ github.ref_name }}       ║"
          echo "║ Build:  #${{ github.run_number }}    ║"
          echo "╠══════════════════════════════════════╣"
          echo "║ 🚀 Ready for deployment via Harness  ║"
          echo "╚══════════════════════════════════════╝"

      - name: Checkout code
        if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || inputs.test_deploy == true
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy via Harness CD Pipeline
        if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || inputs.test_deploy == true
        env:
          HARNESS_API_KEY: ${{ secrets.HARNESS_API_KEY }}
          HARNESS_ACCOUNT_ID: ${{ secrets.HARNESS_ACCOUNT_ID }}
          HARNESS_ORG_ID: ${{ secrets.HARNESS_ORG_ID }}
          HARNESS_PROJECT_ID: ${{ secrets.HARNESS_PROJECT_ID }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_RUN: ${{ github.run_number }}
          GIT_RUN_ID: ${{ github.run_id }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          PIPELINE_ID="springsalereleasebikeshop"
          SHORT_SHA="${GIT_SHA:0:7}"
          BASE_URL="https://app.harness.io/pipeline/api"
          SCOPE="accountIdentifier=${HARNESS_ACCOUNT_ID}&orgIdentifier=${HARNESS_ORG_ID}&projectIdentifier=${HARNESS_PROJECT_ID}"

          # Extract PR number from merge commit message (e.g. "Merge pull request #42 from ...")
          PR_NUM=$(git log -1 --pretty=%s | grep -oP '#\K[0-9]+' || echo "")

          # Build execution name for traceability
          if [ -n "$PR_NUM" ]; then
            EXEC_NAME="PR${PR_NUM}-${SHORT_SHA}-${GIT_RUN}"
          else
            EXEC_NAME="${SHORT_SHA}-${GIT_RUN}"
          fi

          # Step 1: Ensure pipeline exists (create if missing, skip if exists)
          echo "📋 Ensuring pipeline exists..."
          CREATE_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${BASE_URL}/pipelines/v2?${SCOPE}" \
            -H "Content-Type: application/yaml" \
            -H "x-api-key: ${HARNESS_API_KEY}" \
            --data-binary @harness/springsale-release-bike-shop.yaml)

          CREATE_CODE=$(echo "$CREATE_RESPONSE" | tail -1)
          if [ "$CREATE_CODE" -ge 200 ] && [ "$CREATE_CODE" -lt 300 ]; then
            echo "✅ Pipeline created"
          elif [ "$CREATE_CODE" -eq 409 ] || ([ "$CREATE_CODE" -eq 400 ] && echo "$CREATE_RESPONSE" | grep -q "DUPLICATE_FIELD"); then
            echo "ℹ️  Pipeline already exists — updating..."
            UPDATE_RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
              "${BASE_URL}/pipelines/v2/${PIPELINE_ID}?${SCOPE}" \
              -H "Content-Type: application/yaml" \
              -H "x-api-key: ${HARNESS_API_KEY}" \
              --data-binary @harness/springsale-release-bike-shop.yaml)
            UPDATE_CODE=$(echo "$UPDATE_RESPONSE" | tail -1)
            if [ "$UPDATE_CODE" -ge 200 ] && [ "$UPDATE_CODE" -lt 300 ]; then
              echo "✅ Pipeline updated"
            else
              UPDATE_BODY=$(echo "$UPDATE_RESPONSE" | head -n -1)
              echo "⚠️  Pipeline update returned HTTP $UPDATE_CODE (non-blocking)"
              echo "   Response: $UPDATE_BODY"
            fi
          else
            CREATE_BODY=$(echo "$CREATE_RESPONSE" | head -n -1)
            echo "❌ Failed to ensure pipeline (HTTP $CREATE_CODE)"
            echo "   Response: $CREATE_BODY"
            exit 1
          fi

          # Step 2: Execute pipeline with tags for traceability
          echo ""
          echo "▶️  Executing pipeline: $EXEC_NAME"
          PAYLOAD=$(jq -n \
            --arg name "$EXEC_NAME" \
            --arg sha "$SHORT_SHA" \
            --arg pr "${PR_NUM:-none}" \
            --arg build "$GIT_RUN" \
            --arg branch "$GIT_BRANCH" \
            --arg repo "$REPO_URL" \
            --arg runid "$GIT_RUN_ID" \
            '{
              notesForPipelineExecution: ("Triggered by GitHub Actions | Run #" + $build + " | Branch: " + $branch + " | Commit: " + $sha),
              pipeline: {
                identifier: "springsalereleasebikeshop",
                tags: {
                  commitSha: $sha,
                  prNumber: $pr,
                  buildNumber: $build,
                  branch: $branch,
                  executionName: $name
                },
                variables: [
                  { name: "commitSha", type: "String", value: $sha },
                  { name: "buildNumber", type: "String", value: $build },
                  { name: "branch", type: "String", value: $branch },
                  { name: "prNumber", type: "String", value: $pr },
                  { name: "triggeredBy", type: "String", value: "GitHub Actions" },
                  { name: "repoUrl", type: "String", value: $repo },
                  { name: "runId", type: "String", value: $runid }
                ]
              }
            }')

          EXEC_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${BASE_URL}/pipeline/execute/${PIPELINE_ID}?${SCOPE}" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${HARNESS_API_KEY}" \
            -d "$PAYLOAD")

          EXEC_CODE=$(echo "$EXEC_RESPONSE" | tail -1)
          EXEC_BODY=$(echo "$EXEC_RESPONSE" | head -n -1)
          echo ""
          if [ "$EXEC_CODE" -ge 200 ] && [ "$EXEC_CODE" -lt 300 ]; then
            EXEC_ID=$(echo "$EXEC_BODY" | jq -r '.data.planExecution.uuid // "unknown"')
            echo "✅ Pipeline executing (HTTP $EXEC_CODE)"
            echo "   Execution: $EXEC_NAME"
            echo "   PR: ${PR_NUM:-N/A}"
            echo "   Commit: $SHORT_SHA"
            echo "   ID: $EXEC_ID"
          else
            echo "⚠️  Harness execute returned HTTP $EXEC_CODE (non-blocking)"
            echo "   Response: $EXEC_BODY"
          fi


  # ─────────────────────────────────────────
  # STAGE 3b: RELEASE NOTES (Agent) — parallel with security/quality/deploy
  # ─────────────────────────────────────────
  release-notes:
    name: 🤖 Release Notes
    needs: [build, lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate release notes via AI agent
        timeout-minutes: 2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTPUT_FILE: /tmp/release-notes.md
          SHORT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: node scripts/release-notes-agent.mjs

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v1.0.${{ github.run_number }}"
          gh release create "$TAG" \
            --title "Release $TAG" \
            --notes-file /tmp/release-notes.md \
            --target ${{ github.sha }}
          echo "✅ Release $TAG created with AI-generated notes"

  # ─────────────────────────────────────────
  # STAGE 3c: WIKI UPDATES — parallel with security/quality/deploy
  # ─────────────────────────────────────────
  create-docs:
    name: 📚 Wiki Updates
    needs: [build, lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && !inputs.test_deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Create static docs (API, Schema)
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║    CREATING STATIC DOCS              ║"
          echo "╚══════════════════════════════════════╝"
          node scripts/generate-docs.mjs

      - name: Create AI docs (UX)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║    CREATING AI-POWERED UX DOCS       ║"
          echo "║    (GitHub Copilot / Models API)     ║"
          echo "╚══════════════════════════════════════╝"
          node scripts/generate-ai-docs.mjs

      - name: Publish to GitHub Wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📚 Publishing docs to GitHub Wiki..."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          WIKI_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          git clone "$WIKI_URL" wiki-repo 2>/dev/null || {
            echo "⚠️  Wiki not initialized — creating first page"
            mkdir wiki-repo && cd wiki-repo && git init && git remote add origin "$WIKI_URL"
          }

          # Wiki Home page — clean landing
          printf '%s\n' \
            '# 🚲 DevEx Bike Shop — Wiki' \
            '' \
            '> Auto-generated documentation — updated on every push to main.' \
            '' \
            '---' \
            '' \
            '## 📚 Documentation' \
            '' \
            '| Page | Description |' \
            '|------|-------------|' \
            '| [[User Experience]] 🤖 | Customer journey, pages, design system |' \
            '| [[Architecture]] | Tech stack, project structure, security, CI/CD |' \
            '| [[API Reference]] | REST endpoints, auth, validation schemas |' \
            '| [[Database Schema]] | Tables, columns, relationships |' \
            '' \
            '---' \
            '' \
            '🤖 = AI-generated using GitHub Copilot / Models API' \
            > wiki-repo/Home.md

          # 1. AI-generated docs (GitHub Copilot) — human-facing first
          cp docs/USER-EXPERIENCE.md  wiki-repo/User-Experience.md
          cp docs/ARCHITECTURE.md     wiki-repo/Architecture.md

          # 2. Static docs (code-scanned) — technical reference
          cp docs/API.md              wiki-repo/API-Reference.md
          cp docs/SCHEMA.md           wiki-repo/Database-Schema.md

          # 3. Sidebar — controls wiki page order
          printf '%s\n' \
            '### 📚 Documentation' \
            '' \
            '- [[Home]]' \
            '- [[User Experience]] 🤖' \
            '- [[Architecture]]' \
            '- [[API Reference]]' \
            '- [[Database Schema]]' \
            > wiki-repo/_Sidebar.md

          # Find commits since last release tag
          LAST_TAG=$(git -C "${{ github.workspace }}" describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMIT_LOG=$(git -C "${{ github.workspace }}" log ${LAST_TAG}..HEAD --pretty=format:"  - %s (%h)" --no-merges)
            COMMIT_RANGE="${LAST_TAG}..${GITHUB_SHA::7}"
          else
            COMMIT_LOG=$(git -C "${{ github.workspace }}" log -5 --pretty=format:"  - %s (%h)" --no-merges)
            COMMIT_RANGE="last 5 commits"
          fi

          cd wiki-repo
          git add -A
          if git diff --staged --quiet; then
            echo "ℹ️  No doc changes to publish"
          else
            git commit -m "$(printf 'docs: auto-update for %s\n\nGenerated for commits (%s):\n%s' "${GITHUB_SHA::7}" "$COMMIT_RANGE" "$COMMIT_LOG")"
            git push origin HEAD
            echo "✅ Wiki updated successfully"
            echo ""
            echo "📋 Commits covered:"
            echo "$COMMIT_LOG"
          fi
